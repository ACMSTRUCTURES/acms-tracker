// ---------- Feasibility Banner ----------
function FeasibilityBanner({ state, setState, showToast }) {
  const target = state.project.targetDeadline;
  if (!target) return null;

  const { tasks, projectEnd, cursor } = schedule(state);

  // Bottleneck = role with the latest finishing resource
  const roleEnd = {};
  for (const r of state.resources) {
    const wd = cursor[r.id] || 0;
    if (!roleEnd[r.role] || wd > roleEnd[r.role].wd) roleEnd[r.role] = { wd, name: r.name };
  }
  const sortedRoles = Object.entries(roleEnd).sort((a,b) => b[1].wd - a[1].wd);
  const bottleneckRole = sortedRoles[0]?.[0];

  // Compare projectEnd vs target — count working-days slack/overrun
  const wdBetween = (a, b) => {
    if (!a || !b) return 0;
    const sa = new Date(a + 'T00:00:00'), sb = new Date(b + 'T00:00:00');
    const dir = sa <= sb ? 1 : -1;
    let cnt = 0;
    const cur = new Date(sa);
    while (dir > 0 ? cur < sb : cur > sb) {
      cur.setDate(cur.getDate() + dir);
      const dow = cur.getDay();
      if (dow !== 0 && dow !== 6) cnt += dir;
    }
    return cnt;
  };
  const slack = wdBetween(projectEnd, target);
  const feasible = slack >= 0;

  // Simulate adding 1..6 of the bottleneck role and find the smallest set that makes it feasible
  let recommendation = null;
  if (!feasible && bottleneckRole) {
    const role = ROLE_MAP[bottleneckRole];
    for (let n = 1; n <= 6; n++) {
      const extras = [];
      for (let i = 0; i < n; i++) {
        extras.push({ id: '_sim_' + i, role: bottleneckRole,
          name: role.short + (state.resources.filter(r => r.role === bottleneckRole).length + i + 1),
          hrsPerDay: state.hrsPerDay || 9 });
      }
      const simState = { ...state, resources: [...state.resources, ...extras] };
      const sim = schedule(simState);
      if (wdBetween(sim.projectEnd, target) >= 0) {
        recommendation = { add: n, role, simEnd: sim.projectEnd, names: extras.map(e => e.name) };
        break;
      }
    }
    if (!recommendation) {
      // Try adding 6 of bottleneck role and report the resulting end
      const extras = [];
      for (let i = 0; i < 6; i++) {
        extras.push({ id: '_sim_' + i, role: bottleneckRole,
          name: role.short + (state.resources.filter(r => r.role === bottleneckRole).length + i + 1),
          hrsPerDay: state.hrsPerDay || 9 });
      }
      const simState = { ...state, resources: [...state.resources, ...extras] };
      const sim = schedule(simState);
      recommendation = { add: 6, role, simEnd: sim.projectEnd, names: extras.map(e => e.name), insufficient: true };
    }
  }

  const applyRecommendation = () => {
    if (!recommendation) return;
    const newResources = recommendation.names.map(name => ({
      id: uid(), role: recommendation.role.id, name, hrsPerDay: state.hrsPerDay || 9
    }));
    setState(s => ({
      ...s,
      // Snapshot pre-apply resources so the user can revert
      resourceSnapshot: {
        resources: s.resources,
        appliedAt: new Date().toISOString(),
        description: `+${recommendation.add} × ${recommendation.role.short}`,
      },
      resources: [...s.resources, ...newResources],
    }));
    showToast(`Added ${recommendation.add} × ${recommendation.role.short} — Revert available`);
  };

  const revertSnapshot = () => {
    if (!state.resourceSnapshot) return;
    if (!confirm('Revert to the resource pool from before the last planner suggestion? Manual edits made after will be lost.')) return;
    setState(s => ({ ...s, resources: s.resourceSnapshot.resources, resourceSnapshot: null }));
    showToast('Reverted to original planning');
  };
  const dismissSnapshot = () => setState(s => ({ ...s, resourceSnapshot: null }));

  // Per-role utilisation summary (helps spot under-used roles)
  const totalWD = wdBetween(state.project.startDate, projectEnd);
  const roleSummary = ROLES.map(r => {
    const list = state.resources.filter(x => x.role === r.id);
    if (!list.length) return { role: r, count: 0, util: 0, available: false };
    const maxWD = Math.max(...list.map(x => cursor[x.id] || 0));
    const avgWD = list.reduce((a,x) => a + (cursor[x.id] || 0), 0) / list.length;
    return {
      role: r, count: list.length,
      maxWD, avgWD,
      util: totalWD > 0 ? Math.round((avgWD / totalWD) * 100) : 0,
      bottleneck: r.id === bottleneckRole,
      available: true,
    };
  });

  return h('div', {
    className: 'feasibility-banner ' + (feasible ? 'fb-ok' : 'fb-bad'),
  },
    h('div', { className: 'fb-row' },
      h('div', { className: 'fb-status' },
        feasible
          ? h('span', null, '◆ FEASIBLE · ', h('strong', null, slack + ' WD slack'),
              ' to deadline (', target, ')')
          : h('span', null, '▲ OVER DEADLINE · ', h('strong', null, Math.abs(slack) + ' WD overrun'),
              ' (target ', target, ' · projected ', projectEnd, ')')
      ),
      h('div', { className: 'fb-mini' },
        roleSummary.filter(r => r.available).map(r =>
          h('span', { key: r.role.id,
            className: 'fb-chip' + (r.bottleneck ? ' fb-chip-hot' : ''),
            title: `${r.count} × ${r.role.short} — avg ${r.avgWD?.toFixed(0)}/${totalWD} WD utilised`,
          },
            r.role.short, ' ', h('strong', null, r.count), ' · ', r.util, '%'
          )
        )
      )
    ),
    !feasible && recommendation && h('div', { className: 'fb-rec' },
      h('div', { className: 'fb-rec-text' },
        h('span', { className: 'fb-rec-label' }, 'PLANNER RECOMMENDATION:'),
        ' Bottleneck is ', h('strong', null, recommendation.role.label), '. ',
        recommendation.insufficient
          ? h('span', null, 'Even +', recommendation.add, ' resources only brings end to ',
              h('strong', null, recommendation.simEnd),
              '. Consider extending the deadline or trimming scope.')
          : h('span', null, 'Add ', h('strong', null, recommendation.add + ' × ' + recommendation.role.short),
              ' (', recommendation.names.join(', '), ') → projected end ',
              h('strong', null, recommendation.simEnd), ' — fits target.')
      ),
      !recommendation.insufficient && h('button', {
        className: 'btn btn-primary fb-apply',
        onClick: applyRecommendation,
      }, 'Apply suggestion')
    ),
    feasible && slack > 0 && slack < 999 && h('div', { className: 'fb-rec' },
      h('div', { className: 'fb-rec-text' },
        h('span', { className: 'fb-rec-label' }, 'PLANNER NOTE:'),
        ' You have ', h('strong', null, slack + ' WD'), ' of slack. ',
        sortedRoles[sortedRoles.length-1]?.[1]
          ? h('span', null, 'Lowest-loaded role: ',
              h('strong', null, ROLE_MAP[sortedRoles[sortedRoles.length-1][0]]?.label),
              ' — could absorb additional scope or be released early.')
          : null
      )
    ),
    state.resourceSnapshot && h('div', { className: 'fb-rec', style: { borderTop: '1px dashed var(--info)' } },
      h('div', { className: 'fb-rec-text' },
        h('span', { className: 'fb-rec-label', style: { color: 'var(--ok)', textShadow: 'var(--glow-green)' } }, 'SNAPSHOT AVAILABLE:'),
        ' Last planner change → ', h('strong', null, state.resourceSnapshot.description),
        '. Original pool had ', h('strong', null, state.resourceSnapshot.resources.length + ' resources'),
        ' (saved ', new Date(state.resourceSnapshot.appliedAt).toLocaleString('en-GB'), ').'
      ),
      h('div', { style: { display: 'flex', gap: '6px', flexShrink: 0 } },
        h('button', { className: 'btn btn-ghost', onClick: dismissSnapshot,
          style: { fontSize: '10px', padding: '5px 10px' } }, 'Keep'),
        h('button', { className: 'btn fb-apply', onClick: revertSnapshot,
          style: { background: 'var(--info)', borderColor: 'var(--info)', boxShadow: 'var(--glow-cyan)' } },
          '↶ Revert to original'),
      )
    )
  );
}

// ---------- Costing View ----------
function CostingView({ state, tasks, setState }) {
  const m = state.markups || { contingency:5, ohProfitRisk:20, vat:5, corpTax:9, discount:7, fxRate:3.6725 };
  const setMarkup = (key, val) => {
    const v = parseFloat(val); if (isNaN(v)) return;
    setState(s => ({ ...s, markups: { ...(s.markups||{}), [key]: v } }));
  };
  const fmt = (n) => 'AED ' + Math.round(n).toLocaleString();
  const usd = (n) => '$ ' + Math.round(n / m.fxRate).toLocaleString();

  // Live engineering breakdown from current resource pool — two rates per resource:
  //  bid rate  = what we charge the client (drives revenue / "Direct cost")
  //  cost rate = what we actually pay        (drives internal cost; margin = revenue − cost)
  const resById = Object.fromEntries(state.resources.map(r => [r.id, r]));
  const bidRateOf = (t) => {
    const res = resById[t.ownerId];
    if (res && res.rate != null) return res.rate;
    return ROLE_MAP[t.ownerRole]?.rate || 0;
  };
  const costRateOf = (t) => {
    const res = resById[t.ownerId];
    if (res && res.costRate != null) return res.costRate;
    if (res && res.rate != null) return res.rate;
    return ROLE_MAP[t.ownerRole]?.rate || 0;
  };
  const byResource = {};
  for (const t of tasks) {
    if (!t.ownerId) continue;
    const role = ROLE_MAP[t.ownerRole]; if (!role) continue;
    byResource[t.ownerId] = byResource[t.ownerId] || { name: t.owner, role: role.id, hrs: 0, revenue: 0, cost: 0 };
    byResource[t.ownerId].hrs += t.hours || 0;
    byResource[t.ownerId].revenue += (t.hours || 0) * bidRateOf(t);
    byResource[t.ownerId].cost    += (t.hours || 0) * costRateOf(t);
  }
  const resRows = state.resources.map(r => {
    const roleDef = ROLE_MAP[r.role]?.rate || 0;
    const bid = (r.rate != null) ? r.rate : roleDef;
    const cr  = (r.costRate != null) ? r.costRate : bid;
    const agg = byResource[r.id] || { hrs: 0, revenue: 0, cost: 0 };
    return {
      id: r.id, name: r.name, role: r.role, roleLabel: ROLE_MAP[r.role]?.short,
      hrs: agg.hrs, revenue: agg.revenue, cost: agg.cost,
      rate: bid,           // bid rate (used everywhere we previously called .rate)
      costRate: cr,        // internal cost rate
      margin: agg.revenue - agg.cost,
      isCustomRate: r.rate != null && r.rate !== roleDef,
      isExternal: !!r.external,
      hasSalary: !!r.salaryMonthly,
    };
  }).sort((a,b) => ROLES.findIndex(x=>x.id===a.role) - ROLES.findIndex(x=>x.id===b.role));

  // Excel-driven service breakdown (the source of truth for the proposal)
  const services = COSTING_DATA.services;
  const scopeItems = COSTING_DATA.scope_items;
  const phases = COSTING_DATA.phases;

  // Totals from Excel
  const directTotal = services.reduce((a,s) => a + s.direct, 0);
  const contingencyTotal = services.reduce((a,s) => a + s.contingency, 0);
  const ohprTotal = services.reduce((a,s) => a + s.ohpr, 0);
  const taxesTotal = services.reduce((a,s) => a + s.taxes, 0);
  const corpTotal = services.reduce((a,s) => a + s.corp, 0);
  const subtotalBeforeDiscount = directTotal + contingencyTotal + ohprTotal + taxesTotal + corpTotal;
  const discount = subtotalBeforeDiscount * (m.discount / 100);
  const lumpSum = subtotalBeforeDiscount - discount;
  const totalHours = services.reduce((a,s) => a + s.hours, 0);

  return h('div', { className: 'cost-wrap' },
    // Top summary
    h('div', { className: 'cost-summary' },
      h('div', { className: 'cost-summary-stat' },
        h('div', { className: 'num' }, totalHours.toFixed(0)),
        h('div', { className: 'lbl' }, 'Total hours')),
      h('div', { className: 'cost-summary-stat' },
        h('div', { className: 'num' }, fmt(directTotal)),
        h('div', { className: 'lbl' }, 'Direct cost')),
      h('div', { className: 'cost-summary-stat' },
        h('div', { className: 'num', style: { color: 'var(--accent)' } }, fmt(lumpSum)),
        h('div', { className: 'lbl' }, 'Lump sum (after 7% disc)')),
      h('div', { className: 'cost-summary-stat' },
        h('div', { className: 'num' }, usd(lumpSum)),
        h('div', { className: 'lbl' }, 'Lump sum USD')),
    ),

    // Phases
    h('div', { className: 'cost-section' },
      h('div', { className: 'cost-section-head' }, 'Project Phases'),
      h('table', { className: 'cost-table' },
        h('thead', null, h('tr', null,
          h('th', null, 'Phase'),
          h('th', null, 'Scope'),
          h('th', { style: { textAlign: 'right' } }, 'Duration (WD)'),
          h('th', null, 'Team'),
        )),
        h('tbody', null,
          phases.map((p,i) => h('tr', { key: i },
            h('td', { style: { fontFamily: 'var(--mono)', fontWeight: 600 } }, p.phase),
            h('td', null, p.scope),
            h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)' } }, p.duration),
            h('td', { style: { fontFamily: 'var(--mono)', fontSize: '11px' } }, p.team),
          ))
        )
      )
    ),

    // Service breakdown — the actual proposal pricing
    h('div', { className: 'cost-section' },
      h('div', { className: 'cost-section-head' }, 'Cost per Package (Service)'),
      h('div', { style: { fontFamily: 'var(--mono)', fontSize: '10px', color: 'var(--ink-mute)', textTransform: 'uppercase', letterSpacing: '0.14em', marginBottom: '8px' } },
        'From sheet 4. GRC Detail Quotation — full markup build-up per service'),
      h('table', { className: 'cost-table' },
        h('thead', null, h('tr', null,
          h('th', null, 'Service'),
          h('th', { style: { textAlign: 'right' } }, 'Rate'),
          h('th', { style: { textAlign: 'right' } }, 'Hours'),
          h('th', { style: { textAlign: 'right' } }, 'Direct'),
          h('th', { style: { textAlign: 'right' } }, '+ Cont.'),
          h('th', { style: { textAlign: 'right' } }, '+ OH+P+R'),
          h('th', { style: { textAlign: 'right' } }, '+ VAT'),
          h('th', { style: { textAlign: 'right' } }, '+ Corp'),
          h('th', { style: { textAlign: 'right' } }, 'Total (pre-disc)'),
        )),
        h('tbody', null,
          services.map(s => h('tr', { key: s.name },
            h('td', { style: { fontWeight: 600 } }, s.name),
            h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)', color: 'var(--ink-mute)' } }, 'AED ' + s.rate),
            h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)' } }, s.hours.toFixed(1)),
            h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)' } }, fmt(s.direct)),
            h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)', color: 'var(--ink-mute)' } }, fmt(s.contingency)),

// ---------- Invoicing Section ----------
function defaultInvoicing() {
  // From sheet 2. Summary for Proposal-R1 (rows 13-16)
  return COSTING_DATA.invoicing.map((it, i) => ({
    id: 'inv' + (i+1),
    label: it.trigger,
    pct: it.pct,
    milestone: i === 0 ? 'project_start'
             : i === 1 ? 'shop_complete'
             : i === 2 ? 'prod_complete'
             : 'install_complete',
    date: '',
    status: 'pending',
  }));
}

function pctCompletionDateByService(tasks, serviceCode) {
  const filtered = tasks.filter(t => t.serviceCode === serviceCode && t.due);
  if (!filtered.length) return '';
  return filtered.reduce((a, t) => t.due > a ? t.due : a, filtered[0].due);
}

function InvoicingSection({ state, setState, lumpSum, fmt, usd, tasks }) {
  const invoicing = state.invoicing && state.invoicing.length ? state.invoicing : defaultInvoicing();

  const milestones = {
    project_start: state.project.startDate,
    shop_complete: pctCompletionDateByService(tasks, 'shop'),
    td_complete: pctCompletionDateByService(tasks, 'td'),
    prod_complete: pctCompletionDateByService(tasks, 'pd'),
    install_complete: pctCompletionDateByService(tasks, 'inst'),
    bim_complete: pctCompletionDateByService(tasks, 'bim'),
    project_end: state.project.endDate,
    custom: '',
  };

  const updateInv = (id, patch) => setState(s => ({
    ...s,
    invoicing: (s.invoicing && s.invoicing.length ? s.invoicing : defaultInvoicing())
      .map(r => r.id === id ? { ...r, ...patch } : r),
  }));
  const addInv = () => setState(s => {
    const list = (s.invoicing && s.invoicing.length ? s.invoicing : defaultInvoicing());
    return { ...s, invoicing: [...list, { id: 'inv'+Date.now(), label: 'New milestone', pct: 0, milestone: 'custom', date: '', status: 'pending' }] };
  });
  const removeInv = (id) => setState(s => ({
    ...s,
    invoicing: (s.invoicing || []).filter(r => r.id !== id),
  }));
  const resetInv = () => setState(s => ({ ...s, invoicing: defaultInvoicing() }));

  const effDate = (r) => r.milestone === 'custom' ? r.date : (milestones[r.milestone] || r.date || '');
  const sortedInv = invoicing.slice().sort((a,b) => (effDate(a) || '9999').localeCompare(effDate(b) || '9999'));

  const totalPct = invoicing.reduce((a,r) => a + (parseFloat(r.pct)||0), 0);
  const totalAmt = invoicing.reduce((a,r) => a + lumpSum * ((parseFloat(r.pct)||0) / 100), 0);

  let cumPct = 0, cumAmt = 0;
  const STATUS_OPTS = [
    { id: 'pending', label: 'Pending', color: '#8a8580' },
    { id: 'invoiced', label: 'Invoiced', color: '#3b5998' },
    { id: 'paid', label: 'Paid', color: '#2d5a3d' },
    { id: 'overdue', label: 'Overdue', color: '#c8341e' },
  ];

  return h('div', { className: 'cost-section' },
    h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '12px', borderBottom: '1px dashed var(--rule)', paddingBottom: '8px' } },
      h('div', { className: 'cost-section-head', style: { borderBottom: 'none', marginBottom: 0, paddingBottom: 0 } }, 'Invoicing Schedule'),
      h('div', { style: { display: 'flex', gap: '6px' } },
        h('button', { className: 'btn-ghost btn', onClick: resetInv, style: { fontSize: '10px', padding: '5px 10px' } }, 'Reset to Excel'),
        h('button', { className: 'btn-ghost btn', onClick: addInv, style: { fontSize: '10px', padding: '5px 10px' } }, '+ Add milestone'),
      )
    ),
    h('div', { style: { fontFamily: 'var(--mono)', fontSize: '10px', color: 'var(--ink-mute)', textTransform: 'uppercase', letterSpacing: '0.14em', marginBottom: '8px' } },
      `Total ${totalPct.toFixed(0)}% · ${fmt(totalAmt)} · ${usd(totalAmt)}` + (Math.abs(totalPct - 100) > 0.5 ? `  ⚠ does not sum to 100%` : '')),
    h('table', { className: 'cost-table' },
      h('thead', null, h('tr', null,
        h('th', null, '#'),
        h('th', null, 'Milestone / Trigger'),
        h('th', null, 'Linked to'),
        h('th', null, 'Date'),
        h('th', { style: { textAlign: 'right' } }, '%'),
        h('th', { style: { textAlign: 'right' } }, 'Amount (AED)'),
        h('th', { style: { textAlign: 'right' } }, 'Cumulative'),
        h('th', null, 'Status'),
        h('th', null, ''),
      )),
      h('tbody', null,
        sortedInv.map((r,i) => {
          const eff = effDate(r);
          const amt = lumpSum * ((parseFloat(r.pct) || 0) / 100);
          cumPct += (parseFloat(r.pct) || 0);
          cumAmt += amt;
          const stOpt = STATUS_OPTS.find(o => o.id === r.status) || STATUS_OPTS[0];
          return h('tr', { key: r.id },
            h('td', { style: { fontFamily: 'var(--mono)', fontWeight: 600 } }, i+1),
            h('td', null,
              h('input', { value: r.label, onChange: e => updateInv(r.id, { label: e.target.value }),
                style: { border: 'none', borderBottom: '1px dotted transparent', background: 'transparent', padding: '2px 4px', width: '280px' },
                onFocus: e => e.target.style.borderBottomColor = 'var(--ink)',
                onBlur: e => e.target.style.borderBottomColor = 'transparent' })
            ),
            h('td', null,
              h('select', { value: r.milestone, onChange: e => updateInv(r.id, { milestone: e.target.value }),
                style: { fontSize: '11px', fontFamily: 'var(--mono)', padding: '3px 6px', border: '1px solid var(--rule)', background: 'var(--paper)' } },
                h('option', { value: 'project_start' }, 'Project start'),
                h('option', { value: 'shop_complete' }, 'Shop drw complete'),
                h('option', { value: 'td_complete' }, '3D model complete'),
                h('option', { value: 'prod_complete' }, 'Prod drw complete'),
                h('option', { value: 'install_complete' }, 'Install drw complete'),
                h('option', { value: 'bim_complete' }, 'BIM/PM complete'),
                h('option', { value: 'project_end' }, 'Project end'),
                h('option', { value: 'custom' }, 'Custom date'),
              )
            ),
            h('td', null,
              r.milestone === 'custom'
                ? h('input', { type: 'date', value: r.date || '', onChange: e => updateInv(r.id, { date: e.target.value }),
                    style: { fontFamily: 'var(--mono)', fontSize: '11px', border: '1px solid var(--rule)', padding: '3px 6px' } })
                : h('span', { style: { fontFamily: 'var(--mono)', fontSize: '12px', color: 'var(--accent)' } }, eff ? fmtDate(eff) + ' (' + eff + ')' : '—')
            ),
            h('td', { style: { textAlign: 'right' } },
              h('input', { type: 'number', step: '0.5', value: r.pct,
                onChange: e => updateInv(r.id, { pct: parseFloat(e.target.value) || 0 }),
                style: { width: '60px', textAlign: 'right', fontFamily: 'var(--mono)', border: '1px solid var(--rule)', padding: '3px 6px' } })
            ),
            h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)' } }, fmt(amt)),
            h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)', color: 'var(--ink-mute)' } }, fmt(cumAmt) + '  (' + cumPct.toFixed(0) + '%)'),
            h('td', null,
              h('select', { value: r.status, onChange: e => updateInv(r.id, { status: e.target.value }),
                style: { fontSize: '10px', fontFamily: 'var(--mono)', textTransform: 'uppercase', letterSpacing: '0.1em', padding: '3px 6px', border: '1px solid ' + stOpt.color, color: stOpt.color, background: 'var(--paper)', borderRadius: '2px' } },
                STATUS_OPTS.map(o => h('option', { key: o.id, value: o.id }, o.label))
              )
            ),
            h('td', null,
              h('button', { className: 'icon-btn', onClick: () => removeInv(r.id),
                title: 'Remove', style: { color: 'var(--accent)' } }, '×')
            )
          );
        }),
        h('tr', { className: 'cost-total-row' },
          h('td', null, ''), h('td', null, 'TOTAL'),
          h('td', null), h('td', null),
          h('td', { style: { textAlign: 'right' } }, totalPct.toFixed(0) + '%'),
          h('td', { style: { textAlign: 'right' } }, fmt(totalAmt)),
          h('td', null), h('td', null), h('td', null),
        )
      )
    )
  );
}


// ---------- Kanban ----------
function KanbanView({ tasks, updateTask, setEditing }) {
  const [dragId, setDragId] = useState(null);
  const [dragOver, setDragOver] = useState(null);
  return h('div', { className: 'kanban' },
    STATUSES.map(s => {
      const colTasks = tasks.filter(t => t.status === s.id);
      return h('div', { key: s.id,
        className: 'column' + (dragOver === s.id ? ' drag-over' : ''),
        style: { '--col-color': s.color },
        onDragOver: e => { e.preventDefault(); setDragOver(s.id); },
        onDragLeave: () => setDragOver(null),
        onDrop: () => { if (dragId) updateTask(dragId, { status: s.id }); setDragId(null); setDragOver(null); },
      },
        h('div', { className: 'col-header' },
          h('span', { className: 'col-title' }, s.label),
          h('span', { className: 'col-count' }, colTasks.length)
        ),
        colTasks.map(t => h(KanbanCard, {
          key: t.id, task: t,
          onDragStart: () => setDragId(t.id),
          onDragEnd: () => setDragId(null),
          onClick: () => setEditing(t),
          dragging: dragId === t.id,
        }))
      );
    })
  );
}
function KanbanCard({ task, onDragStart, onDragEnd, onClick, dragging }) {
  const overdue = isOverdue(task);
  const prio = PRIO_MAP[task.priority];
  const svcColor = SERVICE_COLORS[task.service] || 'var(--info)';
  return h('div', { className: 'card' + (dragging ? ' dragging' : ''),
    style: {
      '--prio-color': prio?.color || 'transparent',
      '--svc-color': svcColor,
      borderLeft: `3px solid ${svcColor}`,
      boxShadow: `inset 0 0 0 1px ${svcColor}33, 0 0 12px ${svcColor}22`,
    },
    draggable: true, onDragStart, onDragEnd, onClick },
    h('div', { className: 'card-priority' }),
    h('div', {
      style: { fontFamily: 'var(--mono)', fontSize: '9px', textTransform: 'uppercase',
        letterSpacing: '0.14em', color: svcColor, marginBottom: '4px',
        textShadow: `0 0 6px ${svcColor}66` }
    }, task.service),
    h('div', { className: 'card-title' }, task.monolith),
    h('div', { className: 'card-meta' },
      task.owner && h('span', { className: 'tag tag-owner' }, task.owner),
      task.due && h('span', { className: 'tag ' + (overdue ? 'tag-overdue' : 'tag-date') }, fmtDate(task.due)),
      task.hours > 0 && h('span', { className: 'tag' }, task.hours.toFixed(0) + 'h'),
      task.progress > 0 && task.progress < 100 && h('span', { className: 'tag' }, task.progress + '%')
    )
  );
}

// ---------- List with grouping ----------
function ListView({ tasks, groupBy, setEditing, updateTaskOverride }) {
  const grouped = useMemo(() => {
    if (groupBy === 'none') return [{ key: 'All tasks', items: tasks }];
    const keyFn = (t) => groupBy === 'monolith' ? t.monolith
                       : groupBy === 'service' ? t.service
                       : (t.owner || '—');
    const map = new Map();
    for (const t of tasks) { const k = keyFn(t); if (!map.has(k)) map.set(k, []); map.get(k).push(t); }
    // monolith natural order; otherwise alphabetic
    return Array.from(map.entries()).map(([key, items]) => ({ key, items }));
  }, [tasks, groupBy]);

  return h('div', { className: 'list-wrap' },
    h('table', null,
      h('thead', null, h('tr', null,
        h('th', null, 'Task'),
        h('th', null, 'Monolith'),
        h('th', null, 'Service'),
        h('th', null, 'Owner'),
        h('th', null, 'Hours'),
        h('th', null, 'Start'),
        h('th', null, 'Due'),
        h('th', null, 'Status'),
        h('th', null, 'Progress'),
      )),
      h('tbody', null,
        grouped.flatMap(g => [
          groupBy !== 'none' && h('tr', { key: 'g_'+g.key, className: 'group-row' },
            h('td', { colSpan: 9 }, `${g.key} — ${g.items.length} task${g.items.length===1?'':'s'} · ${g.items.reduce((a,t)=>a+(t.hours||0),0).toFixed(1)} hrs`)
          ),
          ...g.items.map(t => {
            const s = STATUS_MAP[t.status]; const overdue = isOverdue(t);
            return h('tr', { key: t.id },
              h('td', { onClick: () => setEditing(t), style: { cursor:'pointer', fontWeight:500 } }, t.title),
              h('td', { style: { fontFamily: 'var(--mono)', fontSize: '11px' } }, t.monolith),
              h('td', { style: { fontFamily: 'var(--mono)', fontSize: '11px' } }, t.service),
              h('td', null, t.owner || '—'),
              h('td', { style: { fontFamily:'var(--mono)', fontSize: '11px' } }, (t.hours||0).toFixed(1)),
              h('td', { style: { fontFamily:'var(--mono)', fontSize:'11px' } }, fmtDate(t.start)),
              h('td', { style: { fontFamily:'var(--mono)', fontSize:'11px', color: overdue?'var(--accent)':'' } }, overdue&&'⚠ ', fmtDate(t.due)),
              h('td', null,
                h('select', {
                  value: t.status,
                  onChange: e => updateTaskOverride && updateTaskOverride(t.id, { status: e.target.value }),
                  style: { fontSize: '10px', fontFamily: 'var(--mono)', textTransform: 'uppercase', letterSpacing: '0.1em',
                           padding: '3px 6px', border: '1px solid ' + (s?.color || 'var(--rule)'),
                           color: s?.color || 'var(--ink)', background: 'var(--paper)', borderRadius: '2px' } },
                  STATUSES.map(opt => h('option', { key: opt.id, value: opt.id }, opt.label))
                )
              ),
              h('td', null, h(InlineProgress, { value: t.progress, onChange: v => updateTaskOverride && updateTaskOverride(t.id, { progress: v }) })),
            );
          })
        ].filter(Boolean))
      )
    )
  );
}
function InlineProgress({ value, onChange }) {
  const v = value || 0;
  const color = v >= 100 ? 'var(--ok)' : v > 0 ? 'var(--ink)' : 'var(--ink-mute)';
  return h('div', { style: { display: 'flex', alignItems: 'center', gap: '6px', minWidth: '160px' } },
    h('input', {
      type: 'range', min: 0, max: 100, step: 5, value: v,
      onChange: e => onChange && onChange(Math.max(0, Math.min(100, parseInt(e.target.value) || 0))),
      style: { flex: 1, accentColor: color, cursor: 'pointer' },
      title: 'Drag to set progress',
    }),
    h('input', {
      type: 'number', min: 0, max: 100, value: v,
      onChange: e => onChange && onChange(Math.max(0, Math.min(100, parseInt(e.target.value) || 0))),
      style: { width: '46px', fontFamily: 'var(--mono)', fontSize: '11px',
               border: '1px solid var(--rule)', padding: '2px 4px', textAlign: 'right',
               color: color, fontWeight: v >= 100 ? 700 : 400 },
    }),
    h('span', { style: { fontFamily: 'var(--mono)', fontSize: '10px', color: 'var(--ink-mute)' } }, '%')
  );
}
function ProgressBar({ value }) {
  return h('div', { style: { display:'flex', alignItems:'center', gap:'8px', minWidth:'90px' } },
    h('div', { style: { flex:1, height:'4px', background:'var(--rule)', borderRadius:'2px', overflow:'hidden' } },
      h('div', { style: { width:(value||0)+'%', height:'100%', background:value===100?'var(--ok)':'var(--ink)' } })
    ),
    h('span', { style: { fontFamily:'var(--mono)', fontSize:'10px', minWidth:'28px' } }, (value||0)+'%')
  );
}

// ---------- Gantt with grouping ----------
function GanttView({ tasks, project, groupBy, setEditing, updateTaskOverride }) {
  const [drag, setDrag] = useState(null); // { id, mode, startX, originStart, originDue, deltaDays }
  const [zoom, setZoom] = useState('day'); // 'day' | 'week' | 'month'
  const [collapsed, setCollapsed] = useState({}); // { 'YYYY-MM': true } — collapsed months
  const dated = tasks.filter(t => t.start && t.due);

  const grouped = useMemo(() => {
    if (groupBy === 'none') return [{ key: null, items: dated }];
    const keyFn = (t) => groupBy === 'monolith' ? t.monolith
                       : groupBy === 'service' ? t.service
                       : (t.owner || '—');
    const map = new Map();
    for (const t of dated) { const k = keyFn(t); if (!map.has(k)) map.set(k, []); map.get(k).push(t); }
    return Array.from(map.entries()).map(([key, items]) => ({ key, items }));
  }, [dated, groupBy]);

  if (dated.length === 0) return h('div', { className: 'empty' },
    h('div', { className: 'empty-mark' }, '─'),
    h('div', { className: 'empty-title' }, 'No tasks scheduled'),
    h('div', { className: 'empty-sub' }, 'Add resources or check Monolith data.')
  );

  const allDates = dated.flatMap(t => [t.start, t.due]).concat([project.startDate, project.endDate, todayISO()]).filter(Boolean);
  const minD = allDates.reduce((a, b) => a < b ? a : b);
  const maxD = allDates.reduce((a, b) => a > b ? a : b);
  const start = addDays(minD, -3);
  const end = addDays(maxD, 3);
  const totalDays = daysBetween(start, end) + 1;
  // Zoom controls dayWidth. Collapsed months override per-day width to a tiny strip.
  const baseDayWidth = zoom === 'day' ? 24 : zoom === 'week' ? 8 : 3;
  const collapsedDayWidth = 2;
  const monthKey = (iso) => iso.slice(0, 7);
  // Pre-compute per-day x offset so bars line up with collapsed columns
  const dayWidths = new Array(totalDays);
  const dayOffsets = new Array(totalDays);
  let cum = 0;
  for (let i = 0; i < totalDays; i++) {
    const iso = addDays(start, i);
    const w = collapsed[monthKey(iso)] ? collapsedDayWidth : baseDayWidth;
    dayOffsets[i] = cum;
    dayWidths[i] = w;
    cum += w;
  }
  const totalWidth = cum;
  // Convert ISO date to x offset (left edge of that day)
  const xOf = (iso) => dayOffsets[Math.max(0, Math.min(totalDays - 1, daysBetween(start, iso)))];
  const widthFromTo = (a, b) => xOf(addDays(b, 1)) - xOf(a) - 2;
  const today = todayISO();
  const todayOffset = xOf(today);
  // Effective "drag step" — use base day width so dragging snaps to one day
  const dayWidth = baseDayWidth;

  const days = [];
  for (let i = 0; i < totalDays; i++) {
    const iso = addDays(start, i);
    const d = new Date(iso);
    const dow = d.getDay();
    const dom = d.getDate();
    days.push({ iso, dom, weekend: dow===0||dow===6, monthStart: dom===1||i===0,
      monthLabel: d.toLocaleDateString('en-GB',{month:'short'}) });
  }

  // Flatten with group header rows
  const rows = [];
  grouped.forEach(g => {
    if (g.key !== null) rows.push({ type:'group', label: `${g.key}  (${g.items.length} · ${g.items.reduce((a,t)=>a+(t.hours||0),0).toFixed(1)} hrs)` });
    g.items.forEach(t => rows.push({ type: 'task', task: t }));
  });

  // Compute month bands for the top header row
  const monthBands = (() => {
    const bands = [];
    let curMonth = null, curStart = 0;
    for (let i = 0; i < totalDays; i++) {
      const iso = addDays(start, i);
      const mk = monthKey(iso);
      if (mk !== curMonth) {
        if (curMonth !== null) bands.push({ key: curMonth, fromIdx: curStart, toIdx: i - 1 });
        curMonth = mk; curStart = i;
      }
    }
    if (curMonth !== null) bands.push({ key: curMonth, fromIdx: curStart, toIdx: totalDays - 1 });
    return bands.map(b => {
      const x = dayOffsets[b.fromIdx];
      const right = dayOffsets[b.toIdx] + dayWidths[b.toIdx];
      return { ...b, x, width: right - x, label: new Date(b.key + '-01T00:00:00').toLocaleDateString('en-GB',{month:'short', year:'2-digit'}) };
    });
  })();

  return h('div', null,
    // Zoom controls
    h('div', { style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '8px',
                        fontFamily: 'var(--mono)', fontSize: '10px', color: 'var(--ink-mute)',
                        textTransform: 'uppercase', letterSpacing: '0.14em' } },
      h('span', null, 'Zoom:'),
      ['day','week','month'].map(z =>
        h('button', { key: z,
          className: 'btn ' + (zoom === z ? '' : 'btn-ghost'),
          style: { padding: '4px 10px', fontSize: '10px' },
          onClick: () => setZoom(z),
        }, z)
      ),
      h('span', { style: { marginLeft: '14px' } }, 'Click any month band to collapse/expand it.'),
      Object.keys(collapsed).filter(k => collapsed[k]).length > 0 && h('button', {
        className: 'btn-ghost btn',
        style: { padding: '4px 10px', fontSize: '10px', marginLeft: '8px' },
        onClick: () => setCollapsed({}),
      }, 'Expand all'),
    ),
    h('div', { className: 'gantt-wrap' },
    h('div', { className: 'gantt-grid', style: { gridTemplateColumns: '260px 1fr' } },
      h('div', { className: 'gantt-left' },
        h('div', { className: 'gantt-left-header', style: { height: zoom === 'month' ? '40px' : '60px' } }, 'Task'),
        rows.map((r, i) => r.type === 'group'
          ? h('div', { key: 'g'+i, className: 'gantt-row-label gantt-group-label' }, r.label)
          : h('div', { key: r.task.id, className: 'gantt-row-label', title: r.task.title }, r.task.title)
        )
      ),
      h('div', { className: 'gantt-right', style: { width: totalWidth + 'px' } },
        // Month band header (clickable to collapse/expand)
        h('div', { style: { height: '20px', position: 'relative', borderBottom: '1px solid var(--rule)',
                             background: 'var(--bg)' } },
          monthBands.map(b => h('div', {
            key: b.key,
            onClick: () => setCollapsed(c => ({ ...c, [b.key]: !c[b.key] })),
            title: collapsed[b.key] ? 'Click to expand ' + b.label : 'Click to collapse ' + b.label,
            style: {
              position: 'absolute', left: b.x + 'px', width: b.width + 'px', top: 0, bottom: 0,
              borderRight: '1px solid var(--rule)',
              borderLeft: '1px solid var(--info)',
              fontFamily: 'var(--mono)', fontSize: '10px', textTransform: 'uppercase',
              letterSpacing: '0.14em', textAlign: 'center', lineHeight: '20px',
              cursor: 'pointer',
              color: collapsed[b.key] ? 'var(--accent)' : 'var(--info)',
              background: collapsed[b.key] ? 'rgba(255,45,111,0.08)' : 'transparent',
              textShadow: collapsed[b.key] ? 'var(--glow-pink)' : 'var(--glow-cyan)',
              overflow: 'hidden', whiteSpace: 'nowrap',
            },
          }, (collapsed[b.key] ? '▶ ' : '▼ ') + b.label))
        ),
        // Day header
        zoom !== 'month' && h('div', { className: 'gantt-timeline-header' },
          days.map((d, i) => h('div', { key: i,
            className: 'gantt-day' + (d.weekend?' weekend':'') + (d.monthStart?' month-start':''),
            style: { width: dayWidths[i] + 'px', overflow: 'hidden' } },
            zoom === 'day' && d.monthStart && h('div', { className: 'month-label' }, d.monthLabel),
            zoom === 'day' && !collapsed[monthKey(d.iso)] && h('div', null, d.dom)
          ))
        ),
        todayOffset >= 0 && todayOffset <= totalWidth &&
          h('div', { className: 'gantt-today', style: { left: todayOffset + 'px',
            top: zoom === 'month' ? '20px' : '60px' } }),
        rows.map((r, i) => {
          if (r.type === 'group') return h('div', { key: 'g'+i, className: 'gantt-row gantt-group-label', style: { background: 'var(--bg)' } });
          const t = r.task;
          const dragging = drag && drag.id === t.id;
          const dxDays = dragging ? drag.deltaDays : 0;
          const dwDays = dragging && drag.mode === 'resize' ? drag.deltaDays : 0;
          const startISO = dragging && drag.mode === 'move' ? addDays(t.start, dxDays) : t.start;
          const dueISO = dragging && drag.mode === 'resize' ? addDays(t.due, dwDays) : t.due;
          const off = xOf(startISO);
          const w = Math.max(widthFromTo(startISO, dueISO), 4);
          const s = STATUS_MAP[t.status];
          const shifted = !!(t._shifted);
          const onBarMouseDown = (mode) => (e) => {
            if (e.button !== 0) return;
            e.preventDefault(); e.stopPropagation();
            const startX = e.clientX;
            const origStart = t.start, origDue = t.due;
            const dragRef = { deltaDays: 0, moved: false };
            setDrag({ id: t.id, mode, startX, origStart, origDue, deltaDays: 0, moved: false });
            const onMove = (ev) => {
              const dpx = ev.clientX - startX;
              const dd = Math.round(dpx / dayWidth);
              dragRef.deltaDays = dd;
              if (Math.abs(dpx) > 3) dragRef.moved = true;
              setDrag(d => d ? { ...d, deltaDays: dd, moved: dragRef.moved } : d);
            };
            const onUp = () => {
              window.removeEventListener('mousemove', onMove);
              window.removeEventListener('mouseup', onUp);
              if (dragRef.moved && dragRef.deltaDays !== 0) {
                if (mode === 'move') {
                  updateTaskOverride(t.id, { start: addDays(origStart, dragRef.deltaDays), due: addDays(origDue, dragRef.deltaDays), _shifted: true });
                } else {
                  const newDue = addDays(origDue, dragRef.deltaDays);
                  if (newDue >= origStart) updateTaskOverride(t.id, { due: newDue, _shifted: true });
                }
              }
              setDrag(null);
            };
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
          };
          return h('div', { key: t.id, className: 'gantt-row' },
            h('div', { className: 'gantt-bar' + (dragging ? ' gantt-bar-dragging' : '') + (shifted ? ' gantt-bar-shifted' : ''),
              style: { left: off + 'px', width: w + 'px', '--bar-color': s?.color, cursor: 'grab' },
              onMouseDown: onBarMouseDown('move'),
              onClick: (e) => { if (!drag || !drag.moved) setEditing(t); },
              title: `${t.title} · ${t.owner} · ${(t.hours||0).toFixed(1)}h${shifted ? ' · manually shifted' : ''} · drag to move, drag right edge to resize` },
              h('div', { className: 'gantt-bar-progress', style: { width: (t.progress||0) + '%' } }),
              h('span', { style: { position:'relative', zIndex:1 } }, t.owner),
              h('div', { className: 'gantt-bar-resize',
                onMouseDown: onBarMouseDown('resize'),
                title: 'Drag to resize' })
            )
          );
        })
      )
    )
    )  // close .gantt-wrap div added earlier
  );
}

// ---------- Calendar ----------
function CalendarView({ tasks, setEditing }) {
  const [month, setMonth] = useState(() => {
    // Default to project start month if available else today
    const t = tasks[0];
    const d = t && t.start ? new Date(t.start) : new Date();
    return { year: d.getFullYear(), month: d.getMonth() };
  });
  const first = new Date(month.year, month.month, 1);
  const last = new Date(month.year, month.month + 1, 0);
  const daysInMonth = last.getDate();
  const today = todayISO();
  const tasksOnDay = (iso) => tasks.filter(t => t.due === iso || t.start === iso);
  const monthLabel = first.toLocaleDateString('en-GB',{month:'long', year:'numeric'});
  const navMonth = (delta) => setMonth(m => { const d = new Date(m.year, m.month+delta, 1); return { year:d.getFullYear(), month:d.getMonth() }; });

  const startDowMon = (first.getDay() + 6) % 7;
  const ordered = [];
  const prevLast = new Date(month.year, month.month, 0).getDate();
  for (let i = startDowMon - 1; i >= 0; i--) ordered.push({ day: prevLast - i, otherMonth: true, date: null });
  for (let d = 1; d <= daysInMonth; d++) {
    const iso = `${month.year}-${String(month.month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    ordered.push({ day: d, otherMonth: false, date: iso, today: iso === today });
  }
  let nx = 1;
  while (ordered.length % 7 !== 0) ordered.push({ day: nx++, otherMonth: true, date: null });

  return h('div', { className: 'cal-wrap' },
    h('div', { className: 'cal-header' },
      h('div', { className: 'cal-title' }, monthLabel),
      h('div', { className: 'cal-nav' },
        h('button', { className: 'btn btn-ghost', onClick: () => navMonth(-1) }, '←'),
        h('button', { className: 'btn btn-ghost', onClick: () => { const d=new Date(); setMonth({year:d.getFullYear(),month:d.getMonth()}); } }, 'Today'),
        h('button', { className: 'btn btn-ghost', onClick: () => navMonth(1) }, '→')
      )
    ),
    h('div', { className: 'cal-grid' },
      ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d => h('div', { key: d, className: 'cal-dow' }, d)),
      ordered.map((c, i) => {
        const dt = c.date ? tasksOnDay(c.date) : [];
        return h('div', { key: i, className: 'cal-day' + (c.otherMonth?' other-month':'') + (c.today?' today':'') },
          h('div', { className: 'cal-date' }, c.day),
          dt.slice(0,3).map(t => {
            const s = STATUS_MAP[t.status];
            return h('div', { key: t.id, className: 'cal-task',
              style: { '--cal-color': s?.color }, onClick: () => setEditing(t), title: t.title }, t.title);
          }),
          dt.length > 3 && h('div', { style: { fontSize:'10px', color:'var(--ink-mute)', fontFamily:'var(--mono)' } }, '+'+(dt.length-3)+' more')
        );
      })
    )
  );
}

// ---------- Modal ----------
function TaskModal({ task, onSave, onClose }) {
  const [t, setT] = useState({ status: task.status, progress: task.progress, notes: task.notes });
  useEffect(() => {
    const onKey = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);
  const set = (k, v) => setT(s => ({ ...s, [k]: v }));
  return h('div', { className: 'modal-backdrop', onClick: onClose },
    h('div', { className: 'modal', onClick: e => e.stopPropagation() },
      h('div', { className: 'modal-head' },
        h('h2', null, task.title),
        h('button', { className: 'icon-btn', onClick: onClose, style: { fontSize: '20px' } }, '×')
      ),
      h('div', { className: 'modal-body' },
        h('div', { className: 'field-row' },
          h('div', { className: 'field' }, h('label', null, 'Monolith'), h('input', { value: task.monolith, readOnly: true })),
          h('div', { className: 'field' }, h('label', null, 'Service'), h('input', { value: task.service, readOnly: true })),
        ),
        h('div', { className: 'field-row' },
          h('div', { className: 'field' }, h('label', null, 'Owner'), h('input', { value: task.owner || '—', readOnly: true })),
          h('div', { className: 'field' }, h('label', null, 'Hours'), h('input', { value: (task.hours||0).toFixed(1), readOnly: true })),
        ),
        h('div', { className: 'field-row' },
          h('div', { className: 'field' }, h('label', null, 'Start (computed)'), h('input', { value: task.start, readOnly: true })),
          h('div', { className: 'field' }, h('label', null, 'Due (computed)'), h('input', { value: task.due, readOnly: true })),
        ),
        h('div', { className: 'field-row' },
          h('div', { className: 'field' }, h('label', null, 'Status'),
            h('select', { value: t.status, onChange: e => set('status', e.target.value) },
              STATUSES.map(s => h('option', { key: s.id, value: s.id }, s.label)))),
          h('div', { className: 'field' }, h('label', null, 'Progress %'),
            h('input', { type:'number', min:0, max:100, value: t.progress || 0,
              onChange: e => set('progress', Math.max(0, Math.min(100, +e.target.value))) }))
        ),
        h('div', { className: 'field' }, h('label', null, 'Notes (override)'),
          h('textarea', { value: t.notes || '', onChange: e => set('notes', e.target.value),
            placeholder: 'Override notes for this task…' }))
      ),
      h('div', { className: 'modal-foot' },
        h('div', { style: { fontFamily:'var(--mono)', fontSize:'10px', color:'var(--ink-mute)' } },
          'Dates and owner are auto-computed from resources. Edit Resources to reschedule.'),
        h('div', { style: { display:'flex', gap:'8px' } },
          h('button', { className: 'btn btn-ghost', onClick: onClose }, 'Cancel'),
          h('button', { className: 'btn btn-primary', onClick: () => onSave(t) }, 'Save')
        )
      )
    )
  );
}

// ---------- Mount with auth gate ----------
const root = createRoot(document.getElementById('root'));

function mountApp() {
  root.render(h(App));
}

// Gate: in deployed (HTTPS) mode require sign-in + project selection.
// In local/file:// mode mount immediately with embedded data.
if (!window.ACMS_AUTH_ENABLED) {
  mountApp();
} else {
  root.render(h(GateScreen, { onReady: mountApp }));
}

// ---------- Sign-in & Project Picker (deployed mode) ----------
function GateScreen({ onReady }) {
  const [phase, setPhase] = useState('check');   // check | login | picker | loading | error
  const [user,  setUser]  = useState(null);
  const [files, setFiles] = useState([]);
  const [err,   setErr]   = useState('');

  useEffect(() => {
    (async () => {
      try {
        const me = await window.acmsAuth.getMe();
        if (me) { setUser(me); setPhase('picker'); await refresh(); }
        else setPhase('login');
      } catch (e) { setErr(String(e)); setPhase('error'); }
    })();
  }, []);

  const refresh = async () => {
    try {
      const list = await window.acmsGraph.listProjects();
      setFiles(list); setPhase('picker');
    } catch (e) { setErr(String(e)); setPhase('error'); }
  };
  const doLogin = async () => {
    setPhase('loading');
    try { const acc = await window.acmsAuth.signIn(); setUser({ email: (acc.username||'').toLowerCase(), name: acc.name }); await refresh(); }
    catch (e) { setErr(String(e)); setPhase('error'); }
  };
  const open = async (file) => {
    setPhase('loading');
    window.ACMS_CURRENT_PROJECT = { fileId: file.id, fileName: file.name };
    window.ACMS_IS_EDITOR = !!user && user.email === (window.ACMS_CONFIG.editorEmail || '').toLowerCase();
    onReady();
  };

  const wrap = { padding: '40px 24px', maxWidth: '640px', margin: '0 auto', fontFamily: 'var(--mono)' };

  if (phase === 'check' || phase === 'loading') {
    return h('div', { style: wrap }, h('div', { className: 'loading' }, 'Connecting'));
  }
  if (phase === 'login') {
    return h('div', { style: wrap },
      h('div', { className: 'brand-mark', style: { fontSize: '28px', marginBottom: '8px' } }, 'ACMS Tracker'),
      h('div', { className: 'brand-sub', style: { marginBottom: '32px' } }, 'Sign in with your ACMSTRUCTURES account'),
      h('button', { className: 'btn btn-primary', style: { padding: '12px 24px', fontSize: '13px' },
        onClick: doLogin }, 'Sign in with Microsoft')
    );
  }
  if (phase === 'error') {
    return h('div', { style: wrap },
      h('div', { className: 'brand-mark', style: { fontSize: '24px', color: 'var(--accent)' } }, '⚠ Error'),
      h('pre', { style: { whiteSpace:'pre-wrap', color:'var(--ink-soft)', marginTop:'12px', fontSize:'11px' } }, err),
      h('button', { className: 'btn btn-ghost', style: { marginTop: '20px' }, onClick: () => location.reload() }, 'Retry')
    );
  }
  // phase === 'picker'
  const isEditor = !!user && user.email === (window.ACMS_CONFIG.editorEmail || '').toLowerCase();
  return h('div', { style: wrap },
    h('div', { style: { display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:'16px' } },
      h('div', null,
        h('div', { className: 'brand-mark', style: { fontSize: '24px' } }, 'ACMS Tracker'),
        h('div', { className: 'brand-sub' }, 'Pick a project · ' + user.email +
          (isEditor ? ' · EDITOR' : ' · VIEWER (read-only)'))
      ),
      h('button', { className: 'btn btn-ghost', style: { fontSize:'10px', padding:'5px 10px' },
        onClick: async () => { await window.acmsAuth.signOut(); location.reload(); } }, 'Sign out')
    ),
    files.length === 0 && h('div', {
      style: { padding: '40px 20px', textAlign: 'center', border: '1px dashed var(--rule)', color: 'var(--ink-mute)' }
    },
      h('div', { style: { marginBottom: '12px' } }, 'No projects in the OneDrive folder yet.'),
      isEditor && h('div', null,
        h('p', { style: { fontSize:'11px', marginBottom:'12px' } }, 'Upload Arena.json to your shared OneDrive folder, then click Refresh.')
      )
    ),
    h('div', { style: { display:'flex', flexDirection:'column', gap:'8px', marginTop:'16px' } },
      files.map(f => h('button', { key: f.id,
        onClick: () => open(f),
        style: { textAlign:'left', padding:'14px 18px', background:'var(--paper)', border:'1px solid var(--rule)',
          color:'var(--ink)', cursor:'pointer', borderLeft: '3px solid var(--info)' } },
        h('div', { style: { fontFamily: 'var(--display)', fontSize: '17px', fontWeight: 500 } },
          (f.name || '').replace(/\.json$/i, '')),
        h('div', { style: { fontSize: '10px', color: 'var(--ink-mute)', marginTop: '4px' } },
          'Modified ' + new Date(f.modified).toLocaleString('en-GB') + ' · ' + Math.round(f.size/1024) + ' KB')
      ))
    ),
    h('div', { style: { marginTop:'18px', display:'flex', gap:'8px' } },
      h('button', { className: 'btn btn-ghost', onClick: refresh, style: { fontSize:'10px' } }, 'Refresh list')
    )
  );
}

</script>
</body>
</html>
