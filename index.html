<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ACMS · Diriyah Gate II Arena</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0a0e14" />
<link rel="apple-touch-icon" href="icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Arena" />
<meta name="mobile-web-app-capable" content="yes" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&family=Inter+Tight:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    /* === GAMER / CYBERPUNK HUD PALETTE === */
    --bg: #0a0e14;
    --bg-grid: #131922;
    --paper: #131922;
    --ink: #e2faff;
    --ink-soft: #9ab3c9;
    --ink-mute: #5b6b80;
    --rule: #1e2a3b;
    --rule-strong: #00f0ff;
    --accent: #ff2d6f;          /* hot magenta */
    --accent-soft: #ff5a8a;
    --ok: #39ff7a;              /* neon green */
    --warn: #ffcc33;            /* arcade yellow */
    --info: #00f0ff;            /* electric cyan */
    --neon-purple: #b14bff;
    --shadow: 0 0 0 1px rgba(0,240,255,0.15), 0 0 24px rgba(0,240,255,0.08);
    --glow-cyan: 0 0 8px rgba(0,240,255,0.6), 0 0 18px rgba(0,240,255,0.25);
    --glow-pink: 0 0 8px rgba(255,45,111,0.7), 0 0 18px rgba(255,45,111,0.3);
    --glow-green: 0 0 8px rgba(57,255,122,0.6), 0 0 18px rgba(57,255,122,0.3);
    --display: 'JetBrains Mono', 'Courier New', monospace;
    --body: 'JetBrains Mono', 'Courier New', monospace;
    --mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  /* iOS PWA: respect notch / home indicator */
  html, body { height: 100%; min-height: 100vh; min-height: -webkit-fill-available; }
  body {
    padding-top:    env(safe-area-inset-top);
    padding-left:   env(safe-area-inset-left);
    padding-right:  env(safe-area-inset-right);
    padding-bottom: env(safe-area-inset-bottom);
    /* Disable tap highlight + double-tap zoom on chrome */
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    overscroll-behavior-y: contain;
  }
  /* Allow text selection inside actual content areas */
  input, textarea, select, .gantt-bar, td, .card-title, .cal-task { -webkit-user-select: text; user-select: text; }
  /* Snappier touch on UI chrome */
  button, .view-tab, .res-row, .col-header, .topbar, .view-bar, .feasibility-banner { touch-action: manipulation; }
  body {
    font-family: var(--body);
    background: var(--bg);
    color: var(--ink);
    background-image:
      radial-gradient(ellipse at top left,  rgba(0,240,255,0.08), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(255,45,111,0.08), transparent 60%),
      linear-gradient(rgba(0,240,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,240,255,0.05) 1px, transparent 1px);
    background-size: auto, auto, 32px 32px, 32px 32px;
    background-position: 0 0, 0 0, -1px -1px, -1px -1px;
    background-attachment: fixed;
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    letter-spacing: 0.01em;
    position: relative;
  }
  /* CRT-style scanlines overlay */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0) 0,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0) 4px
    );
    z-index: 999;
    mix-blend-mode: multiply;
    opacity: 0.35;
  }
  /* Subtle vignette glow on edges */
  body::after {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    box-shadow: inset 0 0 120px rgba(0,240,255,0.12), inset 0 0 280px rgba(0,0,0,0.6);
    z-index: 998;
  }
  ::selection { background: var(--accent); color: #000; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--rule); border: 1px solid var(--info); }
  ::-webkit-scrollbar-thumb:hover { background: var(--info); box-shadow: var(--glow-cyan); }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }

  /* ---------- Top Bar ---------- */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: var(--paper);
    border-bottom: 1.5px solid var(--rule-strong);
    padding: 14px 28px;
    display: flex; align-items: center; gap: 24px;
  }
  .brand { display: flex; align-items: baseline; gap: 12px; }
  .brand-mark {
    font-family: var(--display);
    font-weight: 600;
    font-size: 22px;
    letter-spacing: -0.02em;
  }
  .topbar { box-shadow: 0 0 32px rgba(0,240,255,0.12); }
  .brand-mark {
    color: var(--info);
    text-transform: uppercase;
    text-shadow: var(--glow-cyan);
  }
  .brand-mark::before {
    content: "▶";
    color: var(--accent);
    margin-right: 8px;
    font-size: 16px;
    vertical-align: middle;
    text-shadow: var(--glow-pink);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: translateX(0); }
    50%     { opacity: 0.55; transform: translateX(-2px); }
  }
  .brand-sub { color: var(--accent); text-shadow: 0 0 6px rgba(255,45,111,0.5); }
  .meta-pill {
    background: var(--bg);
    border: 1px solid var(--info);
    color: var(--info);
    text-shadow: var(--glow-cyan);
    box-shadow: var(--glow-cyan);
  }
  .meta-pill .dot {
    background: var(--ok);
    box-shadow: var(--glow-green);
    animation: pulse 1.2s ease-in-out infinite;
  }
  /* Project header */
  .project-header { border-bottom: 1px solid var(--rule); }
  .project-title-input {
    color: var(--info);
    text-shadow: var(--glow-cyan);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 700;
  }
  .meta-label { color: var(--accent); }
  .meta-value { color: var(--ok); }
  .stat-num { color: var(--info); text-shadow: var(--glow-cyan); }
  .stat-label { color: var(--accent); }
  /* View bar / buttons */
  .view-bar { background: var(--bg); border-bottom: 1px solid var(--rule); }
  .view-tab {
    background: var(--bg);
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 600;
    transition: all 0.15s;
  }
  .view-tab:hover { color: var(--info); border-color: var(--info); box-shadow: var(--glow-cyan); }
  .view-tab.active {
    background: var(--info);
    color: #000;
    border-color: var(--info);
    box-shadow: var(--glow-cyan);
    text-shadow: none;
    font-weight: 700;
  }
  .filter-input, .group-select {
    background: var(--bg);
    border: 1px solid var(--rule);
    color: var(--ok);
    font-family: var(--mono);
  }
  .filter-input:focus, .group-select:focus { border-color: var(--accent); box-shadow: var(--glow-pink); color: var(--ink); }
  .btn {
    background: transparent;
    border: 1px solid var(--info);
    color: var(--info);
    text-shadow: var(--glow-cyan);
    transition: all 0.12s;
  }
  .btn:hover { background: var(--info); color: #000; box-shadow: var(--glow-cyan); text-shadow: none; }
  .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: var(--glow-pink); text-shadow: none; }
  .btn-primary:hover { background: var(--accent-soft); border-color: var(--accent-soft); }
  .btn-ghost { border-color: var(--rule); color: var(--ink-soft); text-shadow: none; }
  .btn-ghost:hover { border-color: var(--info); color: var(--info); background: transparent; box-shadow: var(--glow-cyan); }
  /* Kanban */
  .column {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-top: 3px solid var(--col-color, var(--info));
    box-shadow: 0 0 18px rgba(0,240,255,0.05);
  }
  .column.drag-over { background: var(--bg); border-color: var(--accent); box-shadow: var(--glow-pink); }
  .col-title { color: var(--info); text-shadow: var(--glow-cyan); }
  .col-count { background: var(--bg); color: var(--accent); border: 1px solid var(--accent); }
  .card {
    background: var(--bg);
    border: 1px solid var(--rule);
    color: var(--ink);
  }
  .card:hover { border-color: var(--info); box-shadow: var(--glow-cyan); transform: translateY(-2px); }
  .card-title { color: var(--ink); }
  .tag {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
  }
  .tag-owner { background: var(--info); color: #000; border-color: var(--info); box-shadow: var(--glow-cyan); }
  .tag-overdue { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: var(--glow-pink); }
  .add-task { color: var(--ink-mute); border-color: var(--rule); }
  .add-task:hover { border-color: var(--accent); color: var(--accent); border-style: solid; box-shadow: var(--glow-pink); }
  /* List */
  .list-wrap { background: var(--paper); border: 1px solid var(--rule); }
  thead { background: var(--bg); border-bottom: 1.5px solid var(--info); }
  th { color: var(--info); text-transform: uppercase; }
  th:hover { color: var(--accent); text-shadow: var(--glow-pink); }
  td { border-bottom: 1px solid var(--rule); color: var(--ink); }
  tbody tr:hover { background: rgba(0,240,255,0.04); }
  .status-badge { background: var(--bg); }
  .icon-btn { color: var(--ink-mute); }
  .icon-btn:hover { color: var(--accent); background: rgba(255,45,111,0.1); }
  /* Gantt */
  .gantt-wrap { background: var(--paper); border: 1px solid var(--rule); }
  .gantt-left { background: var(--paper); border-right: 1px solid var(--info); }
  .gantt-left-header { background: var(--bg); color: var(--info); border-bottom: 1px solid var(--info); }
  .gantt-row-label { background: var(--paper); color: var(--ink); border-bottom: 1px solid var(--rule); }
  .gantt-timeline-header { background: var(--bg); border-bottom: 1px solid var(--info); }
  .gantt-day { color: var(--ink-mute); border-right: 1px solid var(--rule); }
  .gantt-day.weekend { background: rgba(255,45,111,0.04); }
  .gantt-day .month-label { color: var(--accent); text-shadow: 0 0 4px rgba(255,45,111,0.4); }
  .gantt-row {
    border-bottom: 1px solid var(--rule);
    background: repeating-linear-gradient(90deg, transparent, transparent 23px, rgba(0,240,255,0.06) 23px, rgba(0,240,255,0.06) 24px);
  }
  .gantt-bar {
    background: var(--bar-color, var(--info));
    color: #000;
    box-shadow: 0 0 12px var(--bar-color, rgba(0,240,255,0.6));
    font-weight: 700;
    border-radius: 0;
  }
  .gantt-bar:hover { filter: brightness(1.2); transform: translateY(-1px); }
  .gantt-today { background: var(--accent); box-shadow: 0 0 8px var(--accent), 0 0 18px var(--accent); }
  .gantt-bar-shifted { box-shadow: 0 0 0 2px var(--accent), var(--glow-pink) !important; }
  /* Calendar */
  .cal-wrap { background: var(--paper); border: 1px solid var(--rule); }
  .cal-header { background: var(--bg); border-bottom: 1px solid var(--info); }
  .cal-title { color: var(--info); text-shadow: var(--glow-cyan); text-transform: uppercase; }
  .cal-dow { background: var(--bg); color: var(--accent); border-bottom: 1px solid var(--rule); }
  .cal-day { background: var(--paper); border-color: var(--rule); }
  .cal-day.other-month { background: var(--bg); }
  .cal-day.today { background: rgba(0,240,255,0.08); box-shadow: inset 0 0 0 1px var(--info); }
  .cal-day.today .cal-date { color: var(--info); text-shadow: var(--glow-cyan); }
  .cal-task {
    background: var(--cal-color, var(--info));
    color: #000;
    font-weight: 700;
    border-radius: 0;
  }
  /* Modal */
  .modal-backdrop { background: rgba(10,14,20,0.85); backdrop-filter: blur(6px); }
  .modal {
    background: var(--paper);
    border: 1px solid var(--info);
    box-shadow: var(--glow-cyan), 0 0 80px rgba(255,45,111,0.15);
  }
  .modal-head { border-bottom: 1px solid var(--info); }
  .modal-head h2 { color: var(--info); text-shadow: var(--glow-cyan); text-transform: uppercase; letter-spacing: 0.04em; }
  .field input, .field select, .field textarea {
    background: var(--bg); border: 1px solid var(--rule); color: var(--ok);
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent); box-shadow: var(--glow-pink); outline: none;
  }
  .field label { color: var(--info); }
  /* Toast */
  .toast {
    background: var(--bg);
    color: var(--ok);
    border: 1px solid var(--ok);
    border-left: 3px solid var(--accent);
    box-shadow: var(--glow-green);
    text-shadow: 0 0 4px rgba(57,255,122,0.5);
  }
  /* Empty */
  .empty-mark { color: var(--info); text-shadow: var(--glow-cyan); }
  .empty-title { color: var(--accent); text-shadow: var(--glow-pink); text-transform: uppercase; }
  .empty-sub { color: var(--ink-mute); }
  /* Resources view */
  .res-summary { background: var(--paper); border: 1px solid var(--info); box-shadow: var(--glow-cyan); }
  .res-summary-stat .num { color: var(--info); text-shadow: var(--glow-cyan); }
  .res-summary-stat .lbl { color: var(--accent); }
  .res-role-card { background: var(--paper); border: 1px solid var(--rule); border-left: 3px solid var(--role-color, var(--info)); }
  .res-role-title { color: var(--info); text-shadow: var(--glow-cyan); text-transform: uppercase; }
  .res-role-meta { color: var(--ink-mute); }
  .res-row:hover { background: rgba(0,240,255,0.05); border-color: var(--info); }
  .res-name-input { color: var(--ok); }
  .res-stat { color: var(--ink-soft); }
  .res-stat-warn { color: var(--accent); text-shadow: var(--glow-pink); }
  /* Costing */
  .cost-summary { background: var(--paper); border: 1px solid var(--accent); box-shadow: var(--glow-pink); }
  .cost-summary-stat .num { color: var(--info); text-shadow: var(--glow-cyan); }
  .cost-summary-stat .lbl { color: var(--accent); }
  .cost-section { background: var(--paper); border: 1px solid var(--rule); }
  .cost-section-head { color: var(--info); text-shadow: var(--glow-cyan); text-transform: uppercase; letter-spacing: 0.04em; }
  .cost-table th { color: var(--accent); border-bottom: 1px solid var(--accent); }
  .cost-table td { color: var(--ink); }
  .cost-table tbody tr:hover { background: rgba(0,240,255,0.04); }
  .cost-total-row td { background: rgba(0,240,255,0.08); color: var(--info); border-top: 1px solid var(--info); }
  .cost-subtotal-row td { background: rgba(255,45,111,0.06); color: var(--accent); }
  .cost-final-row td {
    background: linear-gradient(90deg, var(--accent), var(--neon-purple));
    color: #000;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-top: 1px solid var(--accent);
    box-shadow: var(--glow-pink);
    font-weight: 800;
  }
  .group-row td {
    background: var(--bg);
    color: var(--accent);
    text-shadow: var(--glow-pink);
    border-top: 1px solid var(--accent);
  }
  .gantt-group-label { background: var(--bg) !important; color: var(--accent) !important; }
  .brand-sub {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-mute);
  }
  .topbar-spacer { flex: 1; }
  .meta-pill {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
    padding: 5px 10px;
    border: 1px solid var(--rule);
    border-radius: 2px;
    background: var(--paper);
  }
  .meta-pill .dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--ok); margin-right: 6px; vertical-align: 1px;
  }

  /* ---------- Project Header ---------- */
  .project-header {
    padding: 28px 28px 0;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: end;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 20px;
  }
  .project-title-input {
    font-family: var(--display);
    font-size: 38px;
    font-weight: 500;
    letter-spacing: -0.025em;
    line-height: 1.05;
    background: transparent;
    border: none;
    width: 100%;
    color: var(--ink);
    outline: none;
    padding: 4px 0;
  }
  .project-title-input:focus {
    background: var(--paper);
    padding: 4px 8px;
    margin-left: -8px;
  }
  .project-meta {
    display: flex; gap: 28px;
    margin-top: 6px;
  }
  .meta-block { display: flex; flex-direction: column; gap: 2px; }
  .meta-label {
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-mute);
  }
  .meta-value {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
  }
  .stats-cluster {
    display: grid;
    grid-template-columns: repeat(4, auto);
    gap: 32px;
    text-align: right;
  }
  .stat-num {
    font-family: var(--display);
    font-size: 28px;
    font-weight: 500;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .stat-label {
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-mute);
    margin-top: 4px;
  }

  /* ---------- View Switcher ---------- */
  .view-bar {
    padding: 16px 28px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
  }
  .view-tabs { display: flex; gap: 0; }
  .view-tab {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    padding: 8px 14px;
    border: 1px solid var(--rule);
    margin-left: -1px;
    background: var(--paper);
    color: var(--ink-soft);
    transition: all 0.15s;
  }
  .view-tab:first-child { margin-left: 0; }
  .view-tab:hover { color: var(--ink); background: var(--bg); }
  .view-tab.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
    z-index: 1;
    position: relative;
  }
  .view-bar-spacer { flex: 1; }
  .filter-input {
    padding: 7px 12px;
    border: 1px solid var(--rule);
    background: var(--paper);
    font-size: 12px;
    width: 220px;
    border-radius: 2px;
  }
  .filter-input:focus { outline: none; border-color: var(--ink); }
  .btn {
    padding: 7px 14px;
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    border: 1px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    transition: all 0.15s;
  }
  .btn:hover { background: var(--ink); color: var(--paper); }
  .btn-primary { background: var(--ink); color: var(--paper); }
  .btn-primary:hover { background: var(--accent); border-color: var(--accent); }
  .btn-ghost { border-color: var(--rule); color: var(--ink-soft); }
  .btn-ghost:hover { border-color: var(--ink); color: var(--ink); background: var(--paper); }

  /* ---------- Workspace ---------- */
  .workspace { padding: 24px 28px 80px; }

  /* ---------- Loading ---------- */
  .loading {
    padding: 60px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-mute);
  }
  .loading::after {
    content: "·";
    animation: dots 1.2s steps(4) infinite;
  }
  @keyframes dots {
    0%, 25% { content: "·"; }
    50% { content: "··"; }
    75% { content: "···"; }
    100% { content: "····"; }
  }

  /* ---------- Kanban ---------- */
  .kanban {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
    align-items: start;
  }
  .column {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-top: 3px solid var(--col-color, var(--ink));
    min-height: 240px;
    padding: 14px;
  }
  .column.drag-over { background: #fff; border-color: var(--ink); }
  .col-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px; padding-bottom: 10px;
    border-bottom: 1px dashed var(--rule);
  }
  .col-title {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 600;
  }
  .col-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-mute);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 2px;
  }
  .card {
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 12px;
    margin-bottom: 10px;
    cursor: grab;
    transition: all 0.12s;
    position: relative;
  }
  .card:hover { border-color: var(--ink); box-shadow: var(--shadow); transform: translateY(-1px); }
  .card.dragging { opacity: 0.4; cursor: grabbing; }
  .card-priority {
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--prio-color, transparent);
  }
  .card-title {
    font-weight: 500;
    font-size: 13px;
    line-height: 1.35;
    margin-bottom: 8px;
    padding-left: 4px;
  }
  .card-meta {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding-left: 4px;
  }
  .tag {
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 2px 6px;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    background: var(--bg);
  }
  .tag-owner { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .tag-date { color: var(--ink-soft); }
  .tag-overdue { background: var(--accent); color: white; border-color: var(--accent); }
  .add-task {
    width: 100%;
    padding: 8px;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    border: 1px dashed var(--rule);
    color: var(--ink-mute);
    margin-top: 8px;
  }
  .add-task:hover { border-color: var(--ink); color: var(--ink); border-style: solid; }

  /* ---------- List ---------- */
  .list-wrap {
    background: var(--paper);
    border: 1px solid var(--rule);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead {
    background: var(--bg);
    border-bottom: 1.5px solid var(--ink);
  }
  th {
    text-align: left;
    padding: 11px 14px;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
    user-select: none;
  }
  th:hover { color: var(--ink); }
  th .sort-arrow { color: var(--accent); margin-left: 4px; }
  td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--rule);
    vertical-align: middle;
    font-size: 13px;
  }
  tbody tr { transition: background 0.1s; }
  tbody tr:hover { background: #fff; }
  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 3px 8px;
    border: 1px solid;
    background: var(--paper);
  }
  .status-badge .dot { width: 6px; height: 6px; border-radius: 50%; }
  .priority-cell {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .row-actions { text-align: right; }
  .icon-btn {
    padding: 4px 8px;
    font-size: 14px;
    color: var(--ink-mute);
    border-radius: 2px;
  }
  .icon-btn:hover { color: var(--accent); background: var(--bg); }

  /* ---------- Gantt ---------- */
  .gantt-wrap {
    background: var(--paper);
    border: 1px solid var(--rule);
    overflow: auto;
    max-height: 70vh;
  }
  .gantt-grid {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-width: 100%;
  }
  .gantt-left {
    border-right: 1.5px solid var(--ink);
    background: var(--paper);
    position: sticky; left: 0; z-index: 2;
  }
  .gantt-left-header, .gantt-row-label {
    padding: 10px 14px;
    border-bottom: 1px solid var(--rule);
    font-size: 12px;
    height: 40px;
    display: flex; align-items: center;
    background: var(--paper);
  }
  .gantt-left-header {
    background: var(--bg);
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--ink-soft);
    border-bottom: 1.5px solid var(--ink);
  }
  .gantt-row-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .gantt-right { position: relative; }
  .gantt-timeline-header {
    display: flex;
    height: 40px;
    background: var(--bg);
    border-bottom: 1.5px solid var(--ink);
    position: sticky; top: 0; z-index: 1;
  }
  .gantt-day {
    flex-shrink: 0;
    width: 30px;
    border-right: 1px solid var(--rule);
    padding: 4px;
    font-family: var(--mono);
    font-size: 9px;
    text-align: center;
    color: var(--ink-mute);
    display: flex; flex-direction: column; justify-content: center;
  }
  .gantt-day.weekend { background: var(--bg-grid); }
  .gantt-day.month-start { border-left: 1.5px solid var(--ink); }
  .gantt-day .month-label {
    font-weight: 600;
    color: var(--ink);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .gantt-row {
    height: 40px;
    border-bottom: 1px solid var(--rule);
    position: relative;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 29px,
      var(--rule) 29px,
      var(--rule) 30px
    );
  }
  .gantt-bar {
    position: absolute;
    height: 22px;
    top: 9px;
    background: var(--bar-color, var(--ink));
    border-radius: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    padding: 0 8px;
    font-size: 11px;
    font-weight: 500;
    color: white;
    overflow: hidden;
    white-space: nowrap;
    transition: filter 0.15s, transform 0.15s;
    box-shadow: 0 1px 0 rgba(0,0,0,0.15);
  }
  .gantt-bar:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .gantt-bar-dragging { cursor: grabbing !important; opacity: 0.85; outline: 2px dashed var(--ink); outline-offset: 1px; }
  .gantt-bar-shifted { box-shadow: 0 0 0 1.5px var(--accent), 0 1px 0 rgba(0,0,0,0.15); }
  .gantt-bar-resize {
    position: absolute; right: 0; top: 0; bottom: 0; width: 6px;
    cursor: ew-resize; z-index: 2;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
  }
  .gantt-bar-resize:hover { background: rgba(255,255,255,0.6); }
  .gantt-bar-progress {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: rgba(0,0,0,0.25);
  }
  .gantt-today {
    position: absolute;
    top: 40px; bottom: 0;
    width: 2px;
    background: var(--accent);
    z-index: 3;
    pointer-events: none;
  }

  /* ---------- Calendar ---------- */
  .cal-wrap { background: var(--paper); border: 1px solid var(--rule); }
  .cal-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px;
    border-bottom: 1.5px solid var(--ink);
    background: var(--bg);
  }
  .cal-title {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .cal-nav { display: flex; gap: 6px; }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
  .cal-dow {
    padding: 10px;
    text-align: center;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-mute);
    border-bottom: 1px solid var(--rule);
    background: var(--bg);
  }
  .cal-day {
    min-height: 100px;
    padding: 8px;
    border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
    position: relative;
  }
  .cal-day.other-month { background: var(--bg); color: var(--ink-mute); }
  .cal-day.today { background: #fff; }
  .cal-day.today .cal-date { color: var(--accent); font-weight: 700; }
  .cal-date {
    font-family: var(--mono);
    font-size: 12px;
    margin-bottom: 6px;
  }
  .cal-task {
    font-size: 10px;
    padding: 2px 5px;
    margin-bottom: 2px;
    background: var(--cal-color, var(--ink));
    color: white;
    border-radius: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: pointer;
  }
  .cal-task:hover { filter: brightness(1.15); }

  /* ---------- Modal ---------- */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(20,18,15,0.5);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
    animation: fade-in 0.15s ease-out;
  }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--paper);
    border: 1.5px solid var(--ink);
    width: 90%; max-width: 560px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: slide-up 0.2s ease-out;
  }
  @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-head {
    padding: 20px 24px 16px;
    border-bottom: 1.5px solid var(--ink);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-head h2 {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--ink-soft);
  }
  .field input, .field select, .field textarea {
    padding: 8px 10px;
    border: 1px solid var(--rule);
    background: var(--paper);
    border-radius: 2px;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--ink);
  }
  .field textarea { min-height: 70px; resize: vertical; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-foot {
    padding: 16px 24px;
    border-top: 1px solid var(--rule);
    display: flex; justify-content: space-between; gap: 8px;
  }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--ink); color: var(--paper);
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    border-left: 3px solid var(--accent);
    z-index: 200;
    animation: toast-in 0.2s;
  }
  @keyframes toast-in { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ---------- Empty State ---------- */
  .empty {
    padding: 80px 20px;
    text-align: center;
    color: var(--ink-mute);
  }
  .empty-mark {
    font-family: var(--display);
    font-size: 60px;
    color: var(--rule);
    margin-bottom: 16px;
  }
  .empty-title {
    font-family: var(--display);
    font-size: 20px;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .empty-sub { font-size: 13px; margin-bottom: 20px; }

  /* Responsive */
  @media (max-width: 1100px) {
    .kanban { grid-template-columns: repeat(2, 1fr); }
    .stats-cluster { grid-template-columns: repeat(2, auto); gap: 18px; }
    .project-header { grid-template-columns: 1fr; }
  }
  @media (max-width: 640px) {
    body { font-size: 12px; }
    .kanban { grid-template-columns: 1fr; }
    .topbar { padding: 10px 14px; flex-wrap: wrap; gap: 10px; }
    .topbar-spacer { display: none; }
    .meta-pill { font-size: 9px; padding: 4px 8px; }
    .project-header { padding: 18px 14px 14px; gap: 12px; }
    .view-bar { padding: 10px 12px; gap: 6px; flex-wrap: wrap; }
    .workspace { padding: 14px 12px 100px; }
    .project-title-input { font-size: 22px; padding: 0; }
    .project-meta { gap: 14px; flex-wrap: wrap; }
    .meta-block input.meta-value, .meta-block .meta-value { font-size: 12px; }
    .stats-cluster { grid-template-columns: repeat(2, 1fr); gap: 14px; text-align: left; }
    .stat-num { font-size: 22px; }

    .filter-input { width: 100%; min-width: 0; }
    .group-select { font-size: 11px; padding: 6px 8px; min-width: 0; }
    .view-tab { padding: 6px 10px; font-size: 10px; letter-spacing: 0.12em; }
    .btn { padding: 6px 10px; font-size: 10px; letter-spacing: 0.08em; }

    /* Tables — wrap in horizontal scroller */
    .list-wrap, .cost-section, .res-wrap > table { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .cost-table { min-width: 560px; }
    table { min-width: 560px; }
    th, td { padding: 8px 8px; font-size: 11px; }

    /* Resource rows — switch to a vertical card-style layout */
    .res-row {
      grid-template-columns: 24px 1fr auto;
      grid-template-areas:
        "id name actions"
        "id sub  sub"
        "id stats stats";
      row-gap: 4px;
    }
    .res-row > .res-id { grid-area: id; }
    .res-row > div:nth-child(2) { grid-area: name; min-width: 0; }
    .res-row > .icon-btn { grid-area: actions; }
    /* Bid + cost rate, hours, available, util — stack as a flex row in remaining column */
    .res-row > .cost-cell, .res-row > .res-stat {
      grid-area: stats;
      display: inline-flex;
    }
    body.hide-costing .res-row { grid-template-columns: 24px 1fr auto; }

    .res-summary, .cost-summary, .res-summary { grid-template-columns: repeat(2, 1fr) !important; gap: 12px; padding: 12px 14px; }
    .cost-summary-stat .num, .res-summary-stat .num { font-size: 18px; }

    /* Feasibility banner — stack rows */
    .feasibility-banner { margin: 0 12px; padding: 10px 12px; }
    .fb-row { flex-direction: column; align-items: flex-start; gap: 8px; }
    .fb-mini { flex-wrap: wrap; }
    .fb-rec { flex-direction: column; align-items: stretch; gap: 8px; }
    .fb-apply { width: 100%; }

    /* Kanban cards — slightly tighter */
    .card { padding: 10px; }

    /* Gantt left column narrower */
    .gantt-grid { grid-template-columns: 140px 1fr !important; }
    .gantt-row-label, .gantt-left-header { padding: 8px 10px; font-size: 11px; }

    /* Calendar — single column day cells get tiny; let them be */
    .cal-day { min-height: 70px; padding: 4px; }
    .cal-task { font-size: 9px; padding: 1px 3px; }
    .cal-title { font-size: 16px; }

    /* Modal full-width on small screens */
    .modal { width: 96%; max-width: 96%; }
    .modal-body { padding: 14px; }
    .modal-head { padding: 14px 14px 10px; }
    .modal-head h2 { font-size: 16px; }

    /* Panel chips — wrap nicely */
    .cost-section { padding: 12px 14px; }
    .cost-section-head { font-size: 14px; }
  }
  @media (max-width: 420px) {
    /* Even tighter for iPhone SE / Mini */
    .stats-cluster { grid-template-columns: repeat(2, 1fr); }
    .gantt-grid { grid-template-columns: 110px 1fr !important; }
    .project-title-input { font-size: 18px; }
  }

  /* ---------- Resources View ---------- */
  .res-wrap { display: grid; gap: 18px; }
  .res-role-card {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-left: 3px solid var(--role-color, var(--ink));
    padding: 18px 20px;
  }
  .res-role-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 1px dashed var(--rule);
  }
  .res-role-title {
    font-family: var(--display);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .res-role-meta {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-mute);
  }
  .res-list { display: flex; flex-direction: column; gap: 6px; }
  .res-row {
    display: grid;
    grid-template-columns: 28px 1fr 95px 95px 95px 95px 70px 30px;
    gap: 8px;
    align-items: center;
    padding: 6px 8px;
    border: 1px solid transparent;
    border-radius: 2px;
  }
  body.hide-costing .res-row { grid-template-columns: 28px 1fr 100px 100px 90px 30px; }
  body.hide-costing .res-row > .cost-cell { display: none; }
  .res-row:hover { background: var(--bg); border-color: var(--rule); }
  .res-id {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-mute);
    text-align: center;
  }
  .res-name-input, .res-num-input {
    border: none;
    background: transparent;
    padding: 4px 6px;
    border-bottom: 1px dotted transparent;
    font-size: 13px;
  }
  .res-num-input { font-family: var(--mono); text-align: right; font-size: 12px; }
  .res-name-input:focus, .res-num-input:focus {
    outline: none;
    border-bottom-color: var(--ink);
    background: var(--paper);
  }
  .res-stat {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-soft);
    text-align: right;
  }
  .res-stat-warn { color: var(--accent); font-weight: 600; }
  .res-add {
    width: 100%;
    padding: 6px;
    margin-top: 8px;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    border: 1px dashed var(--rule);
    color: var(--ink-mute);
  }
  .res-add:hover { border-color: var(--ink); color: var(--ink); border-style: solid; }
  .res-summary {
    background: var(--paper);
    border: 1.5px solid var(--ink);
    padding: 16px 20px;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 18px;
  }
  body.hide-costing .res-summary { grid-template-columns: repeat(4, 1fr); }
  body.hide-costing .res-summary > .cost-cell { display: none; }
  .res-summary-stat .num {
    font-family: var(--display);
    font-size: 24px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .res-summary-stat .lbl {
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--ink-mute);
    margin-top: 3px;
  }
  /* group headers in list/gantt */
  .group-row td {
    background: var(--bg);
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 700;
    color: var(--ink);
    border-top: 1.5px solid var(--ink);
    border-bottom: 1px solid var(--rule);
    padding: 8px 14px;
  }
  .gantt-group-label {
    background: var(--bg) !important;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 700;
    color: var(--ink);
    border-top: 1.5px solid var(--ink) !important;
  }
  /* ---------- Hide-costing mode ---------- */
  body.hide-costing .cost-cell,
  body.hide-costing th.cost-cell { display: none !important; }
  body.hide-costing .cost-summary-cost,
  body.hide-costing .cost-section.cost-finance { display: none !important; }
  /* ---------- Feasibility Banner ---------- */
  .feasibility-banner {
    margin: 0 28px;
    padding: 14px 18px;
    border: 1px solid;
    border-radius: 0;
    font-family: var(--mono);
    font-size: 12px;
    background: var(--paper);
    position: relative;
    overflow: hidden;
  }
  .feasibility-banner::before {
    content: "";
    position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  }
  .fb-ok {
    border-color: var(--ok);
    box-shadow: var(--glow-green);
  }
  .fb-ok::before { background: var(--ok); box-shadow: var(--glow-green); }
  .fb-ok .fb-status { color: var(--ok); text-shadow: 0 0 6px rgba(57,255,122,0.5); }
  .fb-bad {
    border-color: var(--accent);
    box-shadow: var(--glow-pink);
    animation: fb-flash 2.4s ease-in-out infinite;
  }
  @keyframes fb-flash {
    0%,100% { box-shadow: var(--glow-pink); }
    50%     { box-shadow: 0 0 14px var(--accent), 0 0 32px rgba(255,45,111,0.5); }
  }
  .fb-bad::before { background: var(--accent); box-shadow: var(--glow-pink); }
  .fb-bad .fb-status { color: var(--accent); text-shadow: var(--glow-pink); }
  .fb-row {
    display: flex; justify-content: space-between; align-items: center;
    gap: 18px; flex-wrap: wrap;
  }
  .fb-status {
    text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 700; font-size: 13px;
  }
  .fb-status strong { color: inherit; font-weight: 800; }
  .fb-mini { display: flex; gap: 6px; flex-wrap: wrap; }
  .fb-chip {
    padding: 3px 8px;
    border: 1px solid var(--rule);
    color: var(--ink-soft);

  /* ============ THEME · PROFESSIONAL (drafting paper × modern dashboard) ============

  .field label { color: var(--ink-soft); }

  /* Toast */

  /* Empty state */

  /* Resources */

  .res-summary-stat .num { color: var(--ink); text-shadow: none; font-family: var(--display); }
  .res-summary-stat .lbl { color: var(--ink-mute); }
  .res-role-card { background: var(--paper); border: 1px solid var(--rule); border-left: 3px solid var(--role-color, var(--ink)); box-shadow: var(--shadow); }
  .res-role-title { color: var(--ink); text-shadow: none; text-transform: none; font-family: var(--display); font-weight: 500; }

  .res-stat-warn { color: var(--accent); text-shadow: none; }

  /* Costing + Panels (cost-section / cost-summary shared) */
  .cost-summary { background: var(--paper); border: 1.5px solid var(--ink); box-shadow: var(--shadow); }
  .cost-summary-stat .num { color: var(--ink); text-shadow: none; font-family: var(--display); }
  .cost-summary-stat .lbl { color: var(--ink-mute); }
  .cost-section { background: var(--paper); border: 1px solid var(--rule); box-shadow: var(--shadow); }
  .cost-section-head { color: var(--ink); text-shadow: none; text-transform: none; font-family: var(--display); font-weight: 500; letter-spacing: -0.01em; }
  .cost-table th { color: var(--ink-soft); border-bottom: 1.5px solid var(--ink); }
  .cost-table td { color: var(--ink); border-bottom-color: var(--rule); }
  .cost-table tbody tr:hover { background: var(--bg); }

  .cost-final-row td {
    background: var(--ink); color: var(--paper);
    text-transform: uppercase; letter-spacing: 0.05em;
    box-shadow: none;
    border-top: 2px solid var(--accent);
  }
  .group-row td { background: var(--bg); color: var(--ink-soft); text-shadow: none; border-top: 1.5px solid var(--ink); }
  .gantt-group-label { background: var(--bg) !important; color: var(--ink-soft) !important; border-top: 1.5px solid var(--ink) !important; }

  /* Feasibility banner */

<!--
  ============ ACMS Tracker — Microsoft 365 + OneDrive auth ============
  When deployed (HTTPS, redirect URI matches Entra app), users sign in with their
  ACMSTRUCTURES Microsoft account and the app reads/writes project JSON files
  from a shared OneDrive folder. When opened locally (file://) auth is bypassed
  and the app falls back to embedded data + IndexedDB for offline development.
  ====================================================================
-->
<script>
window.ACMS_CONFIG = {
  tenantId:    '772308f0-707a-45b1-842f-e688a990b0ed',
  clientId:    '386f3712-51c9-4264-a5e1-6776882fdeea',
  redirectUri: 'https://acmstructures.github.io/acms-tracker/',
  editorEmail: 'ali.jibawy@acmstructures.com',
  // Share link to the OneDrive folder containing the project JSON files
  shareLink:   'https://acmstructures-my.sharepoint.com/:f:/p/ali_jibawy/IgBHLhm1dpsrSY5p2uhB966WAfoucTb40tc67-qygV8WlTk?e=f9VRI7',
  scopes:      ['User.Read', 'Files.ReadWrite', 'Files.ReadWrite.All'],
};
// Auth is enabled only on HTTPS (deployed) — file:// or http://localhost run in offline/local mode.
window.ACMS_AUTH_ENABLED = (location.protocol === 'https:');
</script>

<!-- MSAL.js — Microsoft Authentication Library (browser, UMD bundle) -->
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.27.0/lib/msal-browser.min.js"></script>

<script>
/* ============ ACMS auth + Graph helpers ============
   window.acmsAuth = { signIn, signOut, isSignedIn, getMe }
   window.acmsGraph = { listProjects, loadProject, saveProject, getFolderItem }
*/
(function () {
  // Always-available stub (overridden below if MSAL loaded)
  const stub = (msg) => ({
    isSignedIn: () => false,
    getMe: async () => null,
    signIn:  async () => { throw new Error(msg); },
    signOut: async () => {},
  });
  const stubGraph = (msg) => ({
    listProjects: async () => { throw new Error(msg); },
    loadProject:  async () => { throw new Error(msg); },
    saveProject:  async () => { throw new Error(msg); },
    createProject: async () => { throw new Error(msg); },
    getFolderItem: async () => { throw new Error(msg); },
  });

  if (!window.ACMS_AUTH_ENABLED) {
    window.acmsAuth  = { ...stub('local mode'), getMe: async()=>null };
    window.acmsGraph = stubGraph('local mode');
    return;
  }
  // The CDN bundle exposes its API on window.msal — verify it loaded
  const msalApi = window.msal && window.msal.PublicClientApplication ? window.msal : null;
  if (!msalApi) {
    const errMsg = 'MSAL library failed to load — check your network connection or content blocker.';
    console.error('[acms]', errMsg);
    window.acmsAuth  = stub(errMsg);
    window.acmsGraph = stubGraph(errMsg);
    return;
  }
  const C = window.ACMS_CONFIG;
  const pca = new msalApi.PublicClientApplication({
    auth: {
      clientId:    C.clientId,
      authority:   'https://login.microsoftonline.com/' + C.tenantId,
      redirectUri: C.redirectUri,
    },
    cache: {
      cacheLocation: 'localStorage',
      // Cookies as a fallback so a Safari localStorage eviction (after ~7d idle)
      // doesn't force re-entering your password.
      storeAuthStateInCookie: true,
    },
    system: { iframeHashTimeout: 10000, windowHashTimeout: 60000 },
  });

  let _account = null;
  let _folderItem = null; // { driveId, itemId } resolved from shareLink

  async function init() {
    // iOS Safari sometimes keeps an empty hash from PWA launch — clear it so MSAL
    // doesn't choke trying to parse a hash that isn't an auth response.
    try {
      const h = location.hash || '';
      const isAuthResponse = h.includes('code=') || h.includes('access_token=') || h.includes('error=');
      if (h && !isAuthResponse) {
        history.replaceState(null, document.title, location.pathname + location.search);
      }
    } catch (_) {}
    try { await pca.initialize(); } catch (e) { console.warn('msal init', e); }
    try {
      const resp = await pca.handleRedirectPromise();
      if (resp && resp.account) _account = resp.account;
    } catch (e) {
      // Swallow hash_empty_error and similar non-fatal redirect parsing errors —
      // we use popup auth, not redirect, so missing hashes are expected.
      if (!String(e).includes('hash_empty_error')) console.warn('msal redirect', e);
    }
    if (!_account && pca.getAllAccounts().length) _account = pca.getAllAccounts()[0];
  }
  const initPromise = init();

  async function getToken() {
    await initPromise;
    if (!_account) throw new Error('not-signed-in');
    try {
      const r = await pca.acquireTokenSilent({ account: _account, scopes: C.scopes });
      return r.accessToken;
    } catch (e) {
      const r = await pca.acquireTokenPopup({ scopes: C.scopes });
      _account = r.account;
      return r.accessToken;
    }
  }

  async function graph(path, opts) {
    const token = await getToken();
    const url = path.startsWith('http') ? path : ('https://graph.microsoft.com/v1.0' + path);
    const init = { ...(opts||{}), headers: { ...(opts && opts.headers || {}), Authorization: 'Bearer ' + token } };
    const resp = await fetch(url, init);
    if (!resp.ok) throw new Error('graph ' + resp.status + ' ' + (await resp.text()).slice(0,300));
    if (resp.status === 204) return null;
    const ct = resp.headers.get('content-type') || '';
    if (ct.includes('application/json')) return resp.json();
    return resp.text();
  }

  // Encode share URL for Graph /shares/{id} call
  function encodeShareUrl(u) {
    const b64 = btoa(unescape(encodeURIComponent(u))).replace(/=+$/,'').replace(/\//g,'_').replace(/\+/g,'-');
    return 'u!' + b64;
  }

  async function getFolderItem() {
    if (_folderItem) return _folderItem;
    const id = encodeShareUrl(C.shareLink);
    const item = await graph('/shares/' + id + '/driveItem');
    _folderItem = { driveId: item.parentReference.driveId, itemId: item.id };
    return _folderItem;
  }

  window.acmsAuth = {
    isSignedIn: () => !!_account,
    getMe: async () => {
      await initPromise;
      if (!_account) return null;
      return { email: (_account.username || '').toLowerCase(), name: _account.name };
    },
    signIn: async () => {
      await initPromise;
      const r = await pca.loginPopup({ scopes: C.scopes, prompt: 'select_account' });
      _account = r.account;
      return _account;
    },
    signOut: async () => {
      await initPromise;
      await pca.logoutPopup({ account: _account });
      _account = null;
    },
  };

  window.acmsGraph = {
    listProjects: async () => {
      const f = await getFolderItem();
      const r = await graph('/drives/' + f.driveId + '/items/' + f.itemId + '/children?$top=200');
      return (r.value || [])
        .filter(x => x.file && x.name.toLowerCase().endsWith('.json'))
        .map(x => ({ id: x.id, name: x.name, modified: x.lastModifiedDateTime, size: x.size }));
    },
    loadProject: async (fileId) => {
      const f = await getFolderItem();
      const r = await graph('/drives/' + f.driveId + '/items/' + fileId + '/content');
      return typeof r === 'string' ? JSON.parse(r) : r;
    },
    saveProject: async (fileId, json) => {
      const f = await getFolderItem();
      await graph('/drives/' + f.driveId + '/items/' + fileId + '/content', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(json),
      });
    },
    createProject: async (fileName, json) => {
      const f = await getFolderItem();
      const url = '/drives/' + f.driveId + '/items/' + f.itemId + ':/' + encodeURIComponent(fileName) + ':/content';
      const r = await graph(url, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(json),
      });
      return r;
    },
    getFolderItem,
  };
})();
</script>

<script>
/* ----------- Tiny IndexedDB key/value wrapper (no deps) -----------
   Exposed as window.idbGet(key) / window.idbSet(key, val) / window.idbDel(key) / window.idbKeys()
   Used by the React app's loadState / saveState. Falls back gracefully if IDB is unavailable.
*/
(function () {
  var DB_NAME = 'arena-gate';
  var STORE = 'kv';
  var dbPromise = null;
  function openDB() {
    if (dbPromise) return dbPromise;
    if (typeof indexedDB === 'undefined') return Promise.reject(new Error('no-idb'));
    dbPromise = new Promise(function (resolve, reject) {
      var req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = function () {
        var db = req.result;
        if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
      };
      req.onsuccess = function () { resolve(req.result); };
      req.onerror = function () { reject(req.error); };
    });
    return dbPromise;
  }
  function tx(mode, fn) {
    return openDB().then(function (db) {
      return new Promise(function (resolve, reject) {
        var t = db.transaction(STORE, mode);
        var s = t.objectStore(STORE);
        var out;
        var r = fn(s);
        if (r && typeof r.onsuccess !== 'undefined') {
          r.onsuccess = function () { out = r.result; };
        }
        t.oncomplete = function () { resolve(out); };
        t.onerror = function () { reject(t.error); };
        t.onabort = function () { reject(t.error); };
      });
    });
  }
  window.idbGet = function (key)        { return tx('readonly',  function (s) { return s.get(key); }); };
  window.idbSet = function (key, val)   { return tx('readwrite', function (s) { return s.put(val, key); }); };
  window.idbDel = function (key)        { return tx('readwrite', function (s) { return s.delete(key); }); };
  window.idbKeys = function ()          { return tx('readonly',  function (s) { return s.getAllKeys(); }); };
})();

/* ----------- Service Worker registration ----------- */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js')
      .then(function (reg) { /* console.log('[sw] registered', reg.scope); */ })
      .catch(function (err) { console.warn('[sw] register fail', err); });
  });
}

// ---------- Utilities ----------
const todayISO = () => new Date().toISOString().slice(0, 10);
const addDays = (iso, n) => { const d = new Date(iso); d.setDate(d.getDate() + n); return d.toISOString().slice(0,10); };
const daysBetween = (a, b) => Math.round((new Date(b) - new Date(a)) / 86400000);
const fmtDate = (iso) => { if (!iso) return '—'; return new Date(iso).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }); };
const isOverdue = (task) => task.due && task.status !== 'done' && new Date(task.due) < new Date(todayISO());
const uid = () => 'r_' + Math.random().toString(36).slice(2, 9);

// ---------- Storage ----------
// When a project is loaded from OneDrive we keep its file id on window so saves know where to go.
window.ACMS_CURRENT_PROJECT = null; // { fileId, fileName }

// For viewer mode: scrub all cost-sensitive fields from a loaded project so they
// can't be recovered via DevTools. The app also hides the costing UI but this is
// the data-layer guarantee.
function stripCostsForViewer(s) {
  if (!s || typeof s !== 'object') return s;
  const out = JSON.parse(JSON.stringify(s));
  out.hideCosting = true;
  if (Array.isArray(out.resources)) {
    out.resources = out.resources.map(r => ({
      id: r.id, role: r.role, name: r.name, hrsPerDay: r.hrsPerDay,
      blackouts: r.blackouts || [],
      assignedMonoliths: r.assignedMonoliths || [],
      availableFrom: r.availableFrom, availableAfter: r.availableAfter,
      linkedTo: r.linkedTo, external: !!r.external,
      // OMITTED for viewers: rate, costRate, salaryMonthly, salaryUsd
    }));
  }
  delete out.markups;
  delete out.invoicing;
  if (out.costingData) delete out.costingData;
  if (out.schema && Array.isArray(out.schema.roles)) {
    out.schema.roles = out.schema.roles.map(r => ({ id:r.id, label:r.label, short:r.short, color:r.color /* rate stripped */ }));
  }
  return out;
}

async function loadState() {
  // 1) If a project was selected via the picker, use the OneDrive copy as the canonical store.
  const proj = window.ACMS_CURRENT_PROJECT;
  if (proj && window.acmsGraph && window.ACMS_AUTH_ENABLED) {
    try {
      const remote = await window.acmsGraph.loadProject(proj.fileId);
      if (remote) {
        // Cache locally for offline and quick re-loads
        try { if (window.idbSet) await window.idbSet('proj:' + proj.fileId, JSON.stringify(remote)); } catch (_) {}
        // Viewer mode: strip cost-sensitive fields before returning
        return window.ACMS_IS_EDITOR ? remote : stripCostsForViewer(remote);
      }
    } catch (e) {
      console.warn('graph load failed, falling back to local cache', e);
      try {
        const cached = window.idbGet ? await window.idbGet('proj:' + proj.fileId) : null;
        if (cached) return typeof cached === 'string' ? JSON.parse(cached) : cached;
      } catch (_) {}
    }
  }
  // 2) Fallback: IndexedDB (offline / local-dev mode)
  try {
    if (typeof window.idbGet === 'function') {
      const fromIdb = await window.idbGet(STORAGE_KEY);
      if (fromIdb) return typeof fromIdb === 'string' ? JSON.parse(fromIdb) : fromIdb;
    }
  } catch (e) { console.warn('idb load fail', e); }
  // 3) localStorage migration (one-time)
  try {
    const ls = localStorage.getItem(STORAGE_KEY);
    if (ls) {
      if (typeof window.idbSet === 'function') { try { await window.idbSet(STORAGE_KEY, ls); } catch (_) {} }
      return JSON.parse(ls);
    }
  } catch (e) { console.warn('ls load fail', e); }
  // 4) Artifact runtime
  try {
    if (typeof window.storage !== 'undefined') {
      const r = await window.storage.get('arena_gate_state', true);
      if (r && r.value) return JSON.parse(r.value);
    }
  } catch (e) { console.warn('artifact load fail', e); }
  return null;
}
async function saveState(state) {
  const json = JSON.stringify(state);
  const proj = window.ACMS_CURRENT_PROJECT;
  // 1) Save to OneDrive if a project is selected and the user is the editor
  if (proj && window.acmsGraph && window.ACMS_AUTH_ENABLED && window.ACMS_IS_EDITOR) {
    try {
      await window.acmsGraph.saveProject(proj.fileId, state);
    } catch (e) {
      console.warn('graph save failed (offline?). Cached locally.', e);
    }
    // Always cache locally so we can read back offline
    try { if (window.idbSet) await window.idbSet('proj:' + proj.fileId, json); } catch (_) {}
    return;
  }
  // 2) Local-only save (no project selected, or viewer mode)
  try { if (window.idbSet) await window.idbSet(STORAGE_KEY, json); } catch (e) { console.error('idb save fail', e); }
  try { localStorage.setItem(STORAGE_KEY, json); } catch (_) {}
  try { if (typeof window.storage !== 'undefined') await window.storage.set('arena_gate_state', json, true); } catch (_) {}
}
