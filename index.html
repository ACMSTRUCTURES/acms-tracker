// ---------- Scheduler ----------
function schedule(state) {
  // Two-pass scheduling to support "available after another resource finishes":
  //   pass 1 — run normally, collect each resource's last-task end date
  //   pass 2 — for resources with `availableAfter: <otherId>`, set their availableFrom
  //            to the day after the dependency's last task, then rerun.
  const result1 = _runSchedule(state, {});
  const hasDeps = state.resources.some(r => r.availableAfter);
  if (!hasDeps) return result1;
  const lastEnd = {};
  for (const t of result1.tasks) {
    if (!t.ownerId) continue;
    if (!lastEnd[t.ownerId] || t.due > lastEnd[t.ownerId]) lastEnd[t.ownerId] = t.due;
  }
  const overrideFrom = {};
  for (const r of state.resources) {
    if (r.availableAfter && lastEnd[r.availableAfter]) {
      const d = new Date(lastEnd[r.availableAfter] + 'T00:00:00');
      d.setDate(d.getDate() + 1);
      overrideFrom[r.id] = d.toISOString().slice(0,10);
    }
  }
  if (Object.keys(overrideFrom).length === 0) return result1;
  return _runSchedule(state, overrideFrom);
}

function _runSchedule(state, overrideFrom) {
  const startISO = state.project.startDate || '2026-05-01';
  const projectHolidays = new Set(state.holidays || []);

  const byRole = { shop: [], eng: [], se: [], bim: [], res: [] };
  for (const r of state.resources) if (byRole[r.role]) byRole[r.role].push(r);

  // Pre-compute pinning maps: { role: { monoId: resource } }
  // A monolith pinned to a resource short-circuits round-robin for that role+monolith.
  const pinnedByRole = { shop: {}, eng: {}, se: {}, bim: {}, res: {} };
  for (const r of state.resources) {
    if (!Array.isArray(r.assignedMonoliths) || !r.assignedMonoliths.length) continue;
    for (const m of r.assignedMonoliths) {
      if (pinnedByRole[r.role] && !pinnedByRole[r.role][m]) {
        pinnedByRole[r.role][m] = r;
      }
    }
  }

  const rrIdx = { shop: 0, eng: 0, se: 0, bim: 0, res: 0 };
  // Pick a resource for a role+monolith. If any resource is pinned to this monolith, use it;
  // otherwise round-robin over resources that have NO claims (so claimers don't pull other work).
  const pickFor = (role, monoId) => {
    const list = byRole[role];
    if (!list || list.length === 0) return null;
    const pinned = pinnedByRole[role]?.[monoId];
    if (pinned) return pinned;
    // round-robin: prefer resources without any pinned monoliths so the pinned ones don't get extra work
    const unpinned = list.filter(x => !x.assignedMonoliths || x.assignedMonoliths.length === 0);
    const pool = unpinned.length > 0 ? unpinned : list;
    const r = pool[rrIdx[role] % pool.length]; rrIdx[role]++; return r;
  };
  const pickRR = (role) => pickFor(role, null); // legacy alias for non-monolith calls
  const days = (hrs, hpd) => Math.max(1, Math.ceil(hrs / (hpd || state.hrsPerDay || 9)));

  // Date-based working-day math (skips weekends + project holidays + resource vacations)
  const isoOf = (d) => d.toISOString().slice(0, 10);
  const isWorkingDay = (d, vacSet) => {
    const dow = d.getDay();
    if (dow === 0 || dow === 6) return false;
    const iso = isoOf(d);
    if (projectHolidays.has(iso)) return false;
    if (vacSet && vacSet.has(iso)) return false;
    return true;
  };
  // First working day at or after `from`
  const firstWD = (fromISO, vacSet) => {
    const d = new Date(fromISO + 'T00:00:00');
    while (!isWorkingDay(d, vacSet)) d.setDate(d.getDate() + 1);
    return isoOf(d);
  };
  // Add `n` working days (returns date that is the n-th working day starting at `fromISO`, inclusive when n=1 means "1 day duration ending same day")
  const addWD = (fromISO, n, vacSet) => {
    let d = new Date(fromISO + 'T00:00:00');
    let count = 0;
    while (count < n) {
      if (isWorkingDay(d, vacSet)) count++;
      if (count < n) d.setDate(d.getDate() + 1);
    }
    return isoOf(d);
  };
  // Day after a given working day, snapped to next working day
  const nextDayAfter = (iso, vacSet) => {
    const d = new Date(iso + 'T00:00:00');
    d.setDate(d.getDate() + 1);
    while (!isWorkingDay(d, vacSet)) d.setDate(d.getDate() + 1);
    return isoOf(d);
  };

  // cursor[r.id] = the next available working date (ISO) for that resource
  // Honors per-resource "availableFrom" date and overrides from pass-2 (availableAfter dependency)
  const cursor = {};
  const vacSetFor = {};
  for (const r of state.resources) {
    vacSetFor[r.id] = new Set(r.blackouts || []);
    const ovr = overrideFrom && overrideFrom[r.id];
    const af = r.availableFrom;
    const earliest = ovr && ovr > startISO ? ovr
                   : (af && af > startISO) ? af
                   : startISO;
    cursor[r.id] = firstWD(earliest, vacSetFor[r.id]);
  }

  const tasks = [];
  for (const m of state.monoliths) {
    const eng = pickFor('eng', m.id);
    let tdEndISO = startISO;

    const assign = (code, label, res, hrs, prio, mustStartAfter) => {
      const dur = days(hrs, res ? res.hrsPerDay : null);
      let startISO_;
      let dueISO_;
      if (res) {
        const vSet = vacSetFor[res.id];
        // Start at later of: resource's next available date, dependency-required date
        let cand = cursor[res.id];
        if (mustStartAfter && mustStartAfter > cand) cand = firstWD(mustStartAfter, vSet);
        else cand = firstWD(cand, vSet);
        startISO_ = cand;
        dueISO_ = addWD(startISO_, dur, vSet);
        cursor[res.id] = nextDayAfter(dueISO_, vSet);
      } else {
        startISO_ = startISO;
        dueISO_ = addWD(startISO, 1);
      }
      tasks.push({
        id: `t_${m.id}_${code}`,
        title: `${m.id} — ${label}`,
        monolith: m.id, service: label, serviceCode: code,
        status: 'todo', priority: prio,
        owner: res ? res.name : '—',
        ownerId: res ? res.id : null,
        ownerRole: res ? res.role : null,
        start: startISO_, due: dueISO_,
        progress: 0, hours: hrs,
        notes: `${hrs.toFixed(1)} hrs`,
      });
      return dueISO_;
    };

    if (m.shop > 0) assign('shop', 'Shop Drw', pickFor('shop', m.id), m.shop, 'low');
    if (m.td   > 0) tdEndISO = assign('td',   '3D Model',    eng,                     m.td,   'med') || tdEndISO;
    if (m.se   > 0) assign('se',   'Struct Eng',  pickFor('se', m.id),  m.se,   'high');
    if (m.pd   > 0) assign('pd',   'Prod Drw',    eng,                  m.pd,   'med');
    if (m.inst > 0) assign('inst', 'Install Drw', eng,                  m.inst, 'low');
    if (m.bim  > 0) assign('bim',  'BIM + PM',    pickFor('bim', m.id), m.bim,  'med', tdEndISO);
  }

  // ----- Resident Engineer (site presence) — flat allocation, default 30 working days -----
  // Anchored after the latest Install Drw date so the RE arrives once installation is ready.
  if (byRole.res.length > 0) {
    const resDays = state.residentEngineerDays || 30;
    // Find latest install due (the trigger for site work)
    let lastInstall = startISO;
    for (const t of tasks) {
      if (t.serviceCode === 'inst' && t.due > lastInstall) lastInstall = t.due;
    }
    for (const r of byRole.res) {
      const vSet = vacSetFor[r.id];
      const startD = firstWD(lastInstall, vSet);
      const dueD = addWD(startD, resDays, vSet);
      cursor[r.id] = nextDayAfter(dueD, vSet);
      tasks.push({
        id: `t_SITE_${r.id}`,
        title: `Resident Engineer (${r.name}) — site`,
        monolith: 'SITE', service: 'Resident Engineer', serviceCode: 'res',
        status: 'todo', priority: 'high',
        owner: r.name, ownerId: r.id, ownerRole: 'res',
        start: startD, due: dueD,
        progress: 0, hours: resDays * (r.hrsPerDay || 9),
        notes: `${resDays} working days on site`,
      });
    }
  }

  // Project end = latest cursor across all resources (subtract 1 day = the actual last working day)
  let projectEnd = startISO;
  for (const id in cursor) {
    // cursor is "next available", so the previous day was the last working day
    const d = new Date(cursor[id] + 'T00:00:00');
    d.setDate(d.getDate() - 1);
    const iso = isoOf(d);
    if (iso > projectEnd) projectEnd = iso;
  }

  return { tasks, projectEnd, cursor };
}

// ---------- App ----------
function App() {
  const [state, setState] = useState(null);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState('gantt');
  const [filter, setFilter] = useState('');
  const [groupBy, setGroupBy] = useState('monolith');
  const [monoFilter, setMonoFilter] = useState('all');
  const [svcFilter, setSvcFilter] = useState('all');
  const [ownerFilter, setOwnerFilter] = useState('all');
  const [editing, setEditing] = useState(null);
  const [toast, setToast] = useState('');
  const saveTimer = useRef(null);

  useEffect(() => { (async () => {
    const loaded = await loadState();
    // Merge saved state with defaults so older saves don't break a newer schema
    const merged = loaded ? {
      ...DEFAULT_STATE,
      ...loaded,
      project: { ...DEFAULT_STATE.project, ...(loaded.project || {}) },
      resources: (loaded.resources && loaded.resources.length) ? loaded.resources : defaultResources(),
      monoliths: (loaded.monoliths && loaded.monoliths.length) ? loaded.monoliths : MONOLITH_DATA,
      overrides: loaded.overrides || {},
    } : DEFAULT_STATE;
    // Backfill blackouts and rate on any resource missing them
    merged.resources = merged.resources.map(r => ({
      blackouts: [],
      rate: ROLE_MAP[r.role]?.rate ?? 0,
      ...r
    }));
    // Backfill costRate where missing — use bid rate as default (zero margin until set)
    const ROLE_BID = { shop: 57.512, eng: 40, se: 100, bim: 40, res: 150 };
    merged.resources = merged.resources.map(r => {
      const next = { ...r };
      if (next.costRate == null) next.costRate = ROLE_BID[next.role] ?? next.rate ?? 40;
      return next;
    });
    // Ensure holidays array exists
    if (!Array.isArray(merged.holidays)) merged.holidays = DEFAULT_STATE.holidays;
    setState(merged);
    setLoading(false);
  })(); }, []);

  useEffect(() => {
    if (!state || loading) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => saveState({ ...state, lastModified: new Date().toISOString() }), 600);
  }, [state, loading]);

  // Toggle body class when hideCosting changes (drives CSS rules that hide cost cells)
  useEffect(() => {
    if (!state) return;
    document.body.classList.toggle('hide-costing', !!state.hideCosting);
  }, [state && state.hideCosting]);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 2200); };
  const updateProject = (patch) => setState(s => ({ ...s, project: { ...s.project, ...patch } }));

  // Compute schedule
  const { tasks: rawTasks, projectEnd } = useMemo(() => {
    if (!state) return { tasks: [], projectEnd: '' };
    return schedule(state);
  }, [state]);

  // Apply user overrides on top of generated tasks
  const tasks = useMemo(() => {
    if (!state) return [];
    const ov = state.overrides || {};
    return rawTasks.map(t => ov[t.id] ? { ...t, ...ov[t.id] } : t);
  }, [rawTasks, state]);

  const updateTaskOverride = (id, patch) => setState(s => ({
    ...s,
    overrides: { ...(s.overrides || {}), [id]: { ...((s.overrides||{})[id] || {}), ...patch } }
  }));

  // ----- Resource ops -----
  const addResource = (role) => {
    const r = ROLE_MAP[role];
    const existing = state.resources.filter(x => x.role === role);
    const nextNum = existing.length + 1;
    const name = role === 'shop' ? `DM${nextNum > 1 ? nextNum : ''}`
              : role === 'eng' ? `E${state.resources.filter(x => x.role==='eng').length + 1}`
              : role === 'se' ? `SE${nextNum > 1 ? nextNum : ''}`
              : `BIM+PM${nextNum > 1 ? nextNum : ''}`;
    setState(s => ({ ...s, resources: [...s.resources, { id: uid(), role, name, hrsPerDay: s.hrsPerDay || 9 }] }));
    showToast(`Added ${r.short} → ${name}`);
  };
  const removeResource = (id) => {
    if (!confirm('Remove this resource? Their tasks will be reassigned.')) return;
    setState(s => ({ ...s, resources: s.resources.filter(r => r.id !== id) }));
    showToast('Resource removed · planning rebuilt');
  };
  const updateResource = (id, patch) => setState(s => ({
    ...s,
    resources: s.resources.map(r => r.id === id ? { ...r, ...patch } : r),
  }));

  // ----- Project end auto-update -----
  useEffect(() => {
    if (!state || !projectEnd) return;
    if (state.project.endDate !== projectEnd) {
      setState(s => ({ ...s, project: { ...s.project, endDate: projectEnd } }));
    }
  }, [projectEnd]);

  // ----- Export -----
  const exportCSV = () => {
    const cols = ['monolith','service','owner','start','due','hours','status','progress','notes'];
    const esc = v => { if (v==null) return ''; const s = String(v).replace(/"/g,'""'); return /[,"\n]/.test(s)?`"${s}"`:s; };
    const rows = tasks.map(t => [t.monolith,t.service,t.owner,t.start,t.due,t.hours.toFixed(1),STATUS_MAP[t.status]?.label,t.progress,t.notes].map(esc).join(','));
    const csv = [cols.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = `${state.project.code}_${todayISO()}.csv`; a.click();
    showToast('Exported CSV');
  };
  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = `${state.project.code}_${todayISO()}.json`; a.click();
    showToast('Exported JSON');
  };
  const resetAll = () => {
    if (!confirm('Reset to default planning? All overrides will be cleared.')) return;
    setState({ ...DEFAULT_STATE, resources: defaultResources(), lastModified: new Date().toISOString() });
    showToast('Reset complete');
  };

  // Filter (must run before any early return so hook order stays stable)
  const filteredTasks = tasks.filter(t => {
    if (monoFilter !== 'all' && t.monolith !== monoFilter) return false;
    if (svcFilter !== 'all' && t.service !== svcFilter) return false;
    if (ownerFilter !== 'all' && (t.owner || '—') !== ownerFilter) return false;
    if (filter) {
      const f = filter.toLowerCase();
      if (!(t.title.toLowerCase().includes(f) ||
        (t.owner && t.owner.toLowerCase().includes(f)) ||
        (t.monolith && t.monolith.toLowerCase().includes(f)) ||
        (t.service && t.service.toLowerCase().includes(f)) ||
        (t.notes && t.notes.toLowerCase().includes(f)))) return false;
    }
    return true;
  });

  // Filter option lists
  const monolithOptions = useMemo(() => Array.from(new Set(tasks.map(t => t.monolith))).filter(Boolean), [tasks]);
  const serviceOptions = useMemo(() => ['Shop Drw','3D Model','Struct Eng','Prod Drw','Install Drw','BIM + PM'], []);
  const ownerOptions = useMemo(() => Array.from(new Set(tasks.map(t => t.owner || '—'))).sort(), [tasks]);

  if (loading || !state) return h('div', { className: 'loading' }, 'Loading shared workspace');

  // Stats
  const stats = {
    total: tasks.length,
    done: tasks.filter(t => t.status === 'done').length,
    inFlight: tasks.filter(t => t.status === 'in_progress' || t.status === 'review').length,
    overdue: tasks.filter(isOverdue).length,
  };
  const pctComplete = stats.total > 0 ? Math.round((stats.done / stats.total) * 100) : 0;

  return h(React.Fragment, null,
    h('div', { className: 'topbar' },
      h('div', { className: 'brand' },
        h('div', { className: 'brand-mark' }, 'ACMS'),
        h('div', { className: 'brand-sub' }, 'Resource Planner · Shared')
      ),
      h('div', { className: 'topbar-spacer' }),
      h('div', { className: 'meta-pill' }, h('span', { className: 'dot' }), 'Schedule auto-rebuilt')
    ),
    h('div', { className: 'project-header' },
      h('div', null,
        h('input', { className: 'project-title-input', value: state.project.name,
          onChange: e => updateProject({ name: e.target.value }) }),
        h('div', { className: 'project-meta' },
          h(MetaInput, { label: 'Code',   value: state.project.code,         onChange: v => updateProject({ code: v }), w: 130 }),
          h(MetaInput, { label: 'Client', value: state.project.client,       onChange: v => updateProject({ client: v }), w: 200 }),
          h(MetaInput, { label: 'Lead',   value: state.project.leadEngineer, onChange: v => updateProject({ leadEngineer: v }), w: 130 }),
          h(MetaInput, { label: 'Start',  value: state.project.startDate,    onChange: v => updateProject({ startDate: v }), w: 120, type: 'date' }),
          h(MetaInput, { label: 'End (auto)', value: state.project.endDate, onChange: () => {}, w: 120, type: 'date', readOnly: true }),
          h(MetaInput, { label: 'Target deadline', value: state.project.targetDeadline || '', onChange: v => updateProject({ targetDeadline: v }), w: 130, type: 'date' }),
          h(MetaInput, { label: 'Hrs/day', value: state.hrsPerDay, onChange: v => setState(s => ({...s, hrsPerDay: parseFloat(v)||9, resources: s.resources.map(r => ({...r, hrsPerDay: parseFloat(v)||9})) })), w: 60, type: 'number' }),
        )
      ),
      h('div', { className: 'stats-cluster' },
        h(Stat, { num: stats.total,    label: 'Tasks' }),
        h(Stat, { num: state.resources.length, label: 'Resources' }),
        h(Stat, { num: stats.overdue,  label: 'Overdue', danger: stats.overdue > 0 }),
        h(Stat, { num: pctComplete + '%', label: 'Complete' }),
      )
    ),
    h(FeasibilityBanner, { state, setState, showToast }),
    h('div', { className: 'view-bar' },
      h('div', { className: 'view-tabs' },
        ['gantt','list','kanban','calendar','panels','resources','costing'].filter(v => !(v === 'costing' && state.hideCosting)).map(v =>
          h('button', { key: v, className: 'view-tab' + (view === v ? ' active' : ''),
            onClick: () => setView(v) }, v)
        )
      ),
      h('div', { className: 'view-bar-spacer' }),
      (view === 'list' || view === 'gantt') && h('select', {
        className: 'group-select', value: monoFilter, onChange: e => setMonoFilter(e.target.value),
        title: 'Filter by Monolith',
      },
        h('option', { value: 'all' }, 'Monolith: All'),
        monolithOptions.map(m => h('option', { key: m, value: m }, m)),
      ),
      (view === 'list' || view === 'gantt') && h('select', {
        className: 'group-select', value: svcFilter, onChange: e => setSvcFilter(e.target.value),
        title: 'Filter by Service',
      },
        h('option', { value: 'all' }, 'Service: All'),
        serviceOptions.map(s => h('option', { key: s, value: s }, s)),
      ),
      (view === 'list' || view === 'gantt') && h('select', {
        className: 'group-select', value: ownerFilter, onChange: e => setOwnerFilter(e.target.value),
        title: 'Filter by Owner',
      },
        h('option', { value: 'all' }, 'Owner: All'),
        ownerOptions.map(o => h('option', { key: o, value: o }, o)),
      ),
      (view === 'list' || view === 'gantt') && h('select', {
        className: 'group-select', value: groupBy, onChange: e => setGroupBy(e.target.value),
        title: 'Group by',
      },
        h('option', { value: 'none' }, 'Group: none'),
        h('option', { value: 'monolith' }, 'Group: Monolith'),
        h('option', { value: 'service' }, 'Group: Service'),
        h('option', { value: 'owner' }, 'Group: Owner'),
      ),
      (monoFilter !== 'all' || svcFilter !== 'all' || ownerFilter !== 'all') && h('button', {
        className: 'btn-ghost btn',
        onClick: () => { setMonoFilter('all'); setSvcFilter('all'); setOwnerFilter('all'); },
        title: 'Clear all filters',
      }, 'Clear'),
      h('input', { className: 'filter-input', placeholder: 'Filter (monolith, service, owner)…',
        value: filter, onChange: e => setFilter(e.target.value) }),
      h('button', {
        className: 'btn-ghost btn',
        title: state.hideCosting ? 'Show all financial data' : 'Hide all financial / cost data',
        onClick: () => setState(s => {
          const next = !s.hideCosting;
          // If we're on the costing tab and hiding it, jump back to gantt
          if (next && view === 'costing') setView('gantt');
          return { ...s, hideCosting: next };
        }),
        style: state.hideCosting ? { borderColor: 'var(--accent)', color: 'var(--accent)' } : {},
      }, state.hideCosting ? '$ Show costing' : '$ Hide costing'),
      // Scenarios: save current state as a named scenario, or load/delete existing
      h('select', {
        className: 'group-select',
        value: '',
        title: 'Save / load / delete scenarios',
        onChange: (e) => {
          const v = e.target.value;
          e.target.value = '';
          if (v === '__save__') {
            const name = prompt('Name this scenario (e.g. "Baseline", "Aggressive 5 eng", "Batoul off"):');
            if (!name || !name.trim()) return;
            const snapshot = {
              resources: state.resources,
              project: { ...state.project },
              overrides: state.overrides || {},
              monoliths: state.monoliths,
              hideCosting: !!state.hideCosting,
              markups: { ...(state.markups || {}) },
              invoicing: state.invoicing || null,
              hrsPerDay: state.hrsPerDay,
            };
            setState(s => ({
              ...s,
              scenarios: [...(s.scenarios || []), {
                id: 'sc_' + Date.now(),
                name: name.trim(),
                savedAt: new Date().toISOString(),
                snapshot,
              }],
            }));
            showToast(`Scenario "${name.trim()}" saved`);
          } else if (v.startsWith('__load__')) {
            const id = v.slice('__load__'.length);
            const sc = (state.scenarios || []).find(x => x.id === id);
            if (!sc) return;
            if (!confirm(`Load scenario "${sc.name}"? Current resources / overrides / markups will be replaced (you can save the current state first).`)) return;
            setState(s => ({
              ...s,
              ...sc.snapshot,
              project: { ...s.project, ...sc.snapshot.project },
              resourceSnapshot: null,
            }));
            showToast(`Loaded "${sc.name}"`);
          } else if (v.startsWith('__delete__')) {
            const id = v.slice('__delete__'.length);
            const sc = (state.scenarios || []).find(x => x.id === id);
            if (!sc) return;
            if (!confirm(`Delete scenario "${sc.name}"? This cannot be undone.`)) return;
            setState(s => ({ ...s, scenarios: (s.scenarios || []).filter(x => x.id !== id) }));
            showToast(`Deleted "${sc.name}"`);
          }
        },
        style: { minWidth: '140px' },
      },
        h('option', { value: '' }, `Scenarios (${(state.scenarios || []).length})`),
        h('option', { value: '__save__' }, '+ Save current as…'),
        ...((state.scenarios || []).length > 0 ? [
          h('option', { value: '', disabled: true, key: 'sep1' }, '────── load ──────'),
          ...(state.scenarios || []).map(sc =>
            h('option', { key: 'l_' + sc.id, value: '__load__' + sc.id },
              `↻ ${sc.name}  (${new Date(sc.savedAt).toLocaleDateString('en-GB')}, ${sc.snapshot.resources?.length || 0} res)`)
          ),
          h('option', { value: '', disabled: true, key: 'sep2' }, '────── delete ──────'),
          ...(state.scenarios || []).map(sc =>
            h('option', { key: 'd_' + sc.id, value: '__delete__' + sc.id },
              `✕ ${sc.name}`)
          ),
        ] : []),
      ),
      h('button', { className: 'btn-ghost btn', onClick: exportCSV }, 'CSV'),
      h('button', { className: 'btn-ghost btn', onClick: exportJSON }, 'JSON'),
      h('button', { className: 'btn-ghost btn', title: 'Clear manually-shifted Gantt bars',
        onClick: () => {
          if (!confirm('Clear all manually-shifted bars? Auto-schedule will be restored.')) return;
          setState(s => {
            const ov = { ...(s.overrides || {}) };
            for (const k in ov) {
              if (ov[k]._shifted) { const { start, due, _shifted, ...rest } = ov[k]; ov[k] = rest; if (Object.keys(rest).length === 0) delete ov[k]; }
            }
            return { ...s, overrides: ov };
          });
          showToast('Shifts cleared');
        }
      }, 'Clear shifts'),
      h('button', { className: 'btn-ghost btn', onClick: resetAll }, 'Reset')
    ),
    h('div', { className: 'workspace' },
      view === 'kanban'    ? h(KanbanView,    { tasks: filteredTasks, updateTask: updateTaskOverride, setEditing })
      : view === 'list'    ? h(ListView,      { tasks: filteredTasks, groupBy, setEditing, updateTaskOverride })
      : view === 'gantt'   ? h(GanttView,     { tasks: filteredTasks, project: state.project, groupBy, setEditing, updateTaskOverride })
      : view === 'calendar'? h(CalendarView,  { tasks: filteredTasks, setEditing })
      : view === 'panels'  ? h(PanelsView,    { state })
      : view === 'resources' ? h(ResourcesView, { state, setState, addResource, removeResource, updateResource, tasks })
      :                      h(CostingView,  { state, tasks, setState })
    ),
    editing && h(TaskModal, {
      task: editing,
      onSave: (patch) => { updateTaskOverride(editing.id, patch); setEditing(null); showToast('Saved'); },
      onClose: () => setEditing(null),
    }),
    toast && h('div', { className: 'toast' }, toast)
  );
}

// ---------- Sub-components ----------
function MetaInput({ label, value, onChange, type, w, readOnly }) {
  return h('div', { className: 'meta-block' },
    h('span', { className: 'meta-label' }, label),
    h('input', {
      className: 'meta-value',
      style: { width: w + 'px', background: 'transparent', border: 'none',
        borderBottom: '1px dotted transparent', outline: 'none', padding: '2px 0',
        opacity: readOnly ? 0.7 : 1 },
      value: value || '', type: type || 'text', readOnly: !!readOnly,
      onChange: e => onChange(e.target.value),
      onFocus: e => { if (!readOnly) e.target.style.borderBottomColor = 'var(--ink)'; },
      onBlur: e => e.target.style.borderBottomColor = 'transparent',
    })
  );
}

function Stat({ num, label, danger }) {
  return h('div', null,
    h('div', { className: 'stat-num', style: danger ? { color: 'var(--accent)' } : {} }, num),
    h('div', { className: 'stat-label' }, label)
  );
}

// ---------- Resources View ----------
function BlackoutEditor({ dates, onChange, accent }) {
  const [newDate, setNewDate] = useState('');
  const list = (dates || []).slice().sort();
  const c = accent || 'var(--accent)';
  return h('div', { style: { display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: '6px' } },
    list.map(d => h('span', { key: d, style: {
      fontFamily: 'var(--mono)', fontSize: '10px', padding: '3px 6px',
      border: '1px solid ' + c, color: c,
      background: 'var(--bg)', display: 'inline-flex', alignItems: 'center', gap: '4px',
    } },
      d,
      h('button', {
        onClick: () => onChange(list.filter(x => x !== d)),
        style: { background: 'none', border: 'none', color: c, cursor: 'pointer',
                 fontSize: '12px', padding: '0 2px', lineHeight: 1 },
        title: 'Remove',
      }, '×')
    )),
    h('input', { type: 'date', value: newDate, onChange: e => setNewDate(e.target.value),
      style: { fontFamily: 'var(--mono)', fontSize: '11px', padding: '3px 6px',
        border: '1px solid var(--rule)', background: 'var(--bg)', color: 'var(--ink)' } }),
    h('button', {
      onClick: () => { if (newDate && !list.includes(newDate)) { onChange([...list, newDate]); setNewDate(''); } },
      disabled: !newDate,
      style: { fontFamily: 'var(--mono)', fontSize: '10px', padding: '3px 8px',
        border: '1px solid ' + c, color: c, background: 'var(--bg)',
        cursor: newDate ? 'pointer' : 'not-allowed',
        opacity: newDate ? 1 : 0.4, textTransform: 'uppercase', letterSpacing: '0.1em' },
    }, '+ Add'),
    list.length === 0 && h('span', { style: { fontSize: '10px', color: 'var(--ink-mute)', fontStyle: 'italic' } }, 'No dates')
  );
}

function ResourcesView({ state, addResource, removeResource, updateResource, tasks, setState }) {
  const [openVac, setOpenVac] = useState(null); // resource id whose vacation editor is open
  const [openAsg, setOpenAsg] = useState(null); // resource id whose assignment editor is open
  // Stats per resource: total hours assigned, finish date, list of monoliths/services worked
  const hoursPerRes = {};
  const finishPerRes = {};
  const startPerRes = {};
  const monolithsPerRes = {};
  const servicesPerRes = {};
  for (const t of tasks) {
    if (!t.ownerId) continue;
    hoursPerRes[t.ownerId] = (hoursPerRes[t.ownerId] || 0) + (t.hours || 0);
    if (t.due && (!finishPerRes[t.ownerId] || t.due > finishPerRes[t.ownerId])) finishPerRes[t.ownerId] = t.due;
    if (t.start && (!startPerRes[t.ownerId] || t.start < startPerRes[t.ownerId])) startPerRes[t.ownerId] = t.start;
    if (t.monolith) (monolithsPerRes[t.ownerId] = monolithsPerRes[t.ownerId] || new Set()).add(t.monolith);
    if (t.service) (servicesPerRes[t.ownerId] = servicesPerRes[t.ownerId] || new Set()).add(t.service);
  }
  // Available capacity is measured against the TARGET deadline (so pushing the deadline later
  // increases each resource's available hours and therefore drops their util %).
  // Falls back to the auto-computed end date if no target is set.
  const startISO = state.project.startDate;
  const targetISO = state.project.targetDeadline;
  const computedEndISO = state.project.endDate;
  // Use the LATER of (target, computed end) so a tight target doesn't make util appear higher
  // than the work the engine actually scheduled. "Capacity" should reflect either:
  //  - your target window (when you have ambitious capacity expectations), or
  //  - what was actually scheduled (when the schedule overruns the target).
  const ceilingISO = (targetISO && targetISO > (computedEndISO || '')) ? targetISO : computedEndISO;
  let availDays = 0;
  if (startISO && ceilingISO) {
    const s = new Date(startISO), e = new Date(ceilingISO);
    for (let d = new Date(s); d <= e; d.setDate(d.getDate()+1)) {
      const dow = d.getDay();
      if (dow !== 0 && dow !== 6) availDays++;
    }
  }

  // Cost summary
  let totalCost = 0, totalRealCost = 0, totalHrs = 0;
  const costByRole = {};
  ROLES.forEach(r => costByRole[r.id] = { hrs: 0, cost: 0, realCost: 0 });
  // Build lookup: resourceId -> rates (bid + cost)
  const resById = Object.fromEntries(state.resources.map(r => [r.id, r]));
  const bidRateOf = (t) => {
    const res = resById[t.ownerId];
    if (res && res.rate != null) return res.rate;
    return ROLE_MAP[t.ownerRole]?.rate || 0;
  };
  const costRateOf = (t) => {
    const res = resById[t.ownerId];
    if (res && res.costRate != null) return res.costRate;
    if (res && res.rate != null) return res.rate;
    return ROLE_MAP[t.ownerRole]?.rate || 0;
  };
  for (const t of tasks) {
    if (!t.ownerRole) continue;
    const role = ROLE_MAP[t.ownerRole];
    if (!role) continue;
    const bidCost = (t.hours || 0) * bidRateOf(t);
    const realCost = (t.hours || 0) * costRateOf(t);
    costByRole[role.id].hrs += t.hours || 0;
    costByRole[role.id].cost += bidCost;
    costByRole[role.id].realCost += realCost;
    totalHrs += t.hours || 0;
    totalCost += bidCost;
    totalRealCost += realCost;
  }
  const totalMargin = totalCost - totalRealCost;
  const marginPct = totalCost > 0 ? Math.round((totalMargin / totalCost) * 100) : 0;

  return h('div', { className: 'res-wrap' },
    h('div', { className: 'res-summary' },
      h('div', { className: 'res-summary-stat' },
        h('div', { className: 'num' }, state.resources.length),
        h('div', { className: 'lbl' }, 'Resources')
      ),
      h('div', { className: 'res-summary-stat' },
        h('div', { className: 'num' }, totalHrs.toFixed(0)),
        h('div', { className: 'lbl' }, 'Total hours')
      ),
      h('div', { className: 'res-summary-stat cost-cell' },
        h('div', { className: 'num', style: { color: 'var(--info)' } }, 'AED ' + Math.round(totalCost).toLocaleString()),
        h('div', { className: 'lbl' }, 'Total revenue (bid)')
      ),
      h('div', { className: 'res-summary-stat cost-cell' },
        h('div', { className: 'num', style: { color: 'var(--accent)' } }, 'AED ' + Math.round(totalRealCost).toLocaleString()),
        h('div', { className: 'lbl' }, 'Real cost (salaries)')
      ),
      h('div', { className: 'res-summary-stat cost-cell' },
        h('div', { className: 'num', style: { color: totalMargin > 0 ? 'var(--ok)' : 'var(--accent)', textShadow: totalMargin > 0 ? 'var(--glow-green)' : 'var(--glow-pink)' } },
          'AED ' + Math.round(totalMargin).toLocaleString(),
          h('span', { style: { fontFamily: 'var(--mono)', fontSize: '12px', marginLeft: '6px', color: 'var(--ink-mute)', textShadow: 'none' } },
            '(' + marginPct + '%)')
        ),
        h('div', { className: 'lbl' }, 'Margin')
      ),
      h('div', { className: 'res-summary-stat' },
        h('div', { className: 'num' }, availDays),
        h('div', { className: 'lbl' }, 'Working days')
      ),
      h('div', { className: 'res-summary-stat' },
        h('div', { className: 'num' }, state.project.endDate || '—'),
        h('div', { className: 'lbl' }, 'Project end (auto)')
      )
    ),
    // Project-wide holidays
    h('div', { className: 'res-role-card', style: { '--role-color': 'var(--accent)' } },
      h('div', { className: 'res-role-head' },
        h('div', null,
          h('div', { className: 'res-role-title' }, 'Project Holidays'),
          h('div', { className: 'res-role-meta' },
            `Non-working days for everyone — public holidays, project shutdowns. Currently ${(state.holidays||[]).length} day${(state.holidays||[]).length===1?'':'s'}.`)
        )
      ),
      h('div', { style: { padding: '10px 6px' } },
        h(BlackoutEditor, {
          dates: state.holidays || [],
          accent: 'var(--accent)',
          onChange: (next) => setState(s => ({ ...s, holidays: next })),
        })
      )
    ),
    ROLES.map(role => {
      const list = state.resources.filter(r => r.role === role.id);
      const roleHrs = costByRole[role.id].hrs;
      const roleCost = costByRole[role.id].cost;
      return h('div', { key: role.id, className: 'res-role-card', style: { '--role-color': role.color } },
        h('div', { className: 'res-role-head' },
          h('div', null,
            h('div', { className: 'res-role-title' }, role.label),
            h('div', { className: 'res-role-meta' },
              `${role.short} `,
              h('span', { className: 'cost-cell' }, `· AED ${role.rate}/hr `),
              `· ${roleHrs.toFixed(0)} hrs `,
              h('span', { className: 'cost-cell' }, `· AED ${roleCost.toLocaleString()}`)
            )
          ),
          h('div', { className: 'res-role-meta' }, `${list.length} resource${list.length===1?'':'s'}`)
        ),
        h('div', { className: 'res-list' },
          h('div', { className: 'res-row', style: { background: 'transparent', borderColor: 'transparent' } },
            h('div', { className: 'res-id' }, '#'),
            h('div', { className: 'meta-label' }, 'Name'),
            h('div', { className: 'meta-label cost-cell', style: { textAlign: 'right' } }, 'Bid rate'),
            h('div', { className: 'meta-label cost-cell', style: { textAlign: 'right' } }, 'Cost rate'),
            h('div', { className: 'meta-label', style: { textAlign: 'right' } }, 'Hours assigned'),
            h('div', { className: 'meta-label', style: { textAlign: 'right' } }, 'Available'),
            h('div', { className: 'meta-label', style: { textAlign: 'right' } }, 'Util %'),
            h('div')
          ),
          list.length === 0 && h('div', { style: { padding: '14px', fontSize: '12px', color: 'var(--ink-mute)', fontStyle: 'italic', textAlign: 'center', border: '1px dashed var(--rule)' } },
            `No ${role.short} assigned — ${role.id === 'eng' ? 'no engineering work will be scheduled' : 'tasks will show as unassigned'}.`),
          list.flatMap((r, i) => {
            const assigned = hoursPerRes[r.id] || 0;
            const vacCount = (r.blackouts || []).length;
            const effectiveDays = Math.max(0, availDays - (state.holidays||[]).length - vacCount);
            const available = effectiveDays * (r.hrsPerDay || 9);
            const util = available > 0 ? Math.round((assigned / available) * 100) : 0;
            const isOpen = openVac === r.id;
            const roleDefault = ROLE_MAP[r.role]?.rate || 0;
            const usedRate = (r.rate != null) ? r.rate : roleDefault;
            const isCustom = r.rate != null && r.rate !== roleDefault;
            // Compute per-resource sub-info
            const role = ROLE_MAP[r.role];
            const finishDate = finishPerRes[r.id];
            const startDate = startPerRes[r.id];
            const monoSet = monolithsPerRes[r.id];
            const svcSet = servicesPerRes[r.id];
            const monoArr = monoSet ? Array.from(monoSet) : [];
            const svcArr = svcSet ? Array.from(svcSet) : [];
            const monoSummary = monoArr.length === 0 ? 'no work assigned'
                              : monoArr.length <= 6 ? monoArr.join(', ')
                              : `${monoArr.slice(0,5).join(', ')} +${monoArr.length-5} more`;
            const svcSummary = svcArr.join(' · ');
            const subtitleColor = role?.color || 'var(--info)';
            const row = h('div', { key: r.id, className: 'res-row' },
              h('div', { className: 'res-id' }, i + 1),
              h('div', { style: { display: 'flex', flexDirection: 'column', gap: '2px', minWidth: 0 } },
                // Row 1: name + EXT/INT chip
                h('div', { style: { display: 'flex', alignItems: 'center', gap: '6px' } },
                  h('input', { className: 'res-name-input', value: r.name, style: { flex: 1 },

                  h('button', {
                    onClick: () => {
                      const becomesExt = !r.external;
                      const patch = { external: becomesExt };
                      if (becomesExt) {

                        patch.salaryUsd = null;

                      }
                      updateResource(r.id, patch);
                    },
                    title: r.external ? 'External resource — billed at the bid rate. Click to convert to internal.' : 'Internal resource — paid by salary. Click to convert to external (cost = bid).',
                    style: {

                      padding: '2px 6px', cursor: 'pointer',
                      border: '1px solid ' + (r.external ? 'var(--info)' : 'var(--rule)'),
                      background: r.external ? 'var(--info)' : 'transparent',
                      color: r.external ? '#000' : 'var(--ink-mute)',
                      fontWeight: r.external ? 700 : 500,
                      textTransform: 'uppercase',
                      boxShadow: r.external ? 'var(--glow-cyan)' : 'none',
                    },
                  }, r.external ? 'EXT' : 'INT'),
                ),
                // Row 2: small subtitle line — same style as the role meta but at resource level
                h('div', { style: { fontFamily: 'var(--mono)', fontSize: '9px', letterSpacing: '0.06em',
                  color: 'var(--ink-mute)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                  display: 'flex', alignItems: 'center', gap: '8px' } },
                  // Role + rate
                  h('span', { className: 'cost-cell', style: { color: subtitleColor, fontWeight: 600 } },
                    role?.short || '—', ' · AED ', (r.rate != null ? r.rate : (role?.rate || 0)), '/hr'),
                  // hrs/day editor
                  h('span', { style: { color: 'var(--ink-mute)' } }, '· '),
                  h('input', {
                    type: 'number', step: '0.5', min: '1', max: '24', value: r.hrsPerDay || 9,
                    onChange: e => updateResource(r.id, { hrsPerDay: parseFloat(e.target.value) || 9 }),
                    title: 'Working hours/day for this resource (e.g. 4 for part-time, 9 standard, 11 with overtime)',
                    style: { width: '34px', fontFamily: 'var(--mono)', fontSize: '9px',
                      border: 'none', borderBottom: '1px dotted var(--rule)',
                      background: 'transparent',
                      color: (r.hrsPerDay && r.hrsPerDay !== (state.hrsPerDay || 9)) ? 'var(--accent)' : 'var(--ink-mute)',
                      padding: '0 2px', textAlign: 'center' },
                  }),
                  h('span', { style: { color: 'var(--ink-mute)' } }, 'h/day'),
                  // Link to another resource (same person — merges in payment table)
                  h('span', { style: { color: 'var(--ink-mute)' } }, '·'),
                  h('select', {
                    value: r.linkedTo || '',
                    onChange: e => updateResource(r.id, { linkedTo: e.target.value || null }),
                    title: 'Link to another resource entry as the same person — payments will merge in the bottom table',
                    style: { fontFamily: 'var(--mono)', fontSize: '9px', padding: '0 2px',
                      background: 'transparent',
                      color: r.linkedTo ? 'var(--neon-purple)' : 'var(--ink-mute)',
                      border: 'none',
                      borderBottom: '1px dotted ' + (r.linkedTo ? 'var(--neon-purple)' : 'var(--rule)'),
                      textShadow: r.linkedTo ? '0 0 4px rgba(177,75,255,0.5)' : 'none' },
                  },
                    h('option', { value: '' }, 'standalone'),
                    state.resources.filter(x => x.id !== r.id && !x.linkedTo).map(x =>
                      h('option', { key: x.id, value: x.id }, `same as ${x.name}`)
                    ),
                  ),
                  // Available-from / available-after (joins after another resource finishes)
                  (() => {
                    const dep = r.availableAfter ? state.resources.find(x => x.id === r.availableAfter) : null;
                    const depFinish = dep ? finishPerRes[dep.id] : null;
                    const startsLabel = depFinish
                      ? new Date(depFinish).toLocaleDateString('en-GB',{day:'2-digit',month:'short'})
                      : (r.availableFrom ? new Date(r.availableFrom).toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) : null);
                    return h('span', { style: { display: 'inline-flex', alignItems: 'center', gap: '4px' } },
                      h('span', { style: { color: 'var(--ink-mute)' } }, '·'),
                      // Mode toggle / dependency picker
                      h('select', {

                        onChange: e => {
                          const v = e.target.value;
                          if (v === '__start__') updateResource(r.id, { availableAfter: null, availableFrom: null });
                          else if (v === '__date__') updateResource(r.id, { availableAfter: null });
                          else updateResource(r.id, { availableAfter: v, availableFrom: null });
                        },
                        title: 'When this resource starts work',
                        style: { fontFamily: 'var(--mono)', fontSize: '9px', padding: '0 2px',
                          background: 'transparent', color: (r.availableAfter || r.availableFrom) ? 'var(--accent)' : 'var(--ink-mute)',
                          border: 'none', borderBottom: '1px dotted ' + ((r.availableAfter || r.availableFrom) ? 'var(--accent)' : 'var(--rule)') },
                      },
                        h('option', { value: '__start__' }, 'from project start'),
                        h('option', { value: '__date__' }, 'from date…'),
                        state.resources.filter(x => x.id !== r.id).map(x =>
                          h('option', { key: x.id, value: x.id }, `after ${x.name} finishes`)
                        ),
                      ),
                      // If date mode, show the date picker
                      r.availableAfter ? h('span', { style: { color: 'var(--accent)', textShadow: 'var(--glow-pink)' } },
                        depFinish ? '→ ' + startsLabel : '(unscheduled)'
                      )

                          border: 'none', borderBottom: '1px dotted ' + (r.availableFrom ? 'var(--accent)' : 'var(--rule)'),

                    color: (r.rate != null && r.rate !== roleDefault) ? 'var(--accent)' : 'var(--info)',

              h('button', { className: 'icon-btn', onClick: () => removeResource(r.id),

            );
            const isAsgOpen = openAsg === r.id;
            const out = [row];
            if (isOpen) {

                gridColumn: '1 / -1', padding: '10px 8px', marginTop: '-4px', marginBottom: '4px',

              const allMonoIds = state.monoliths.map(x => x.id);
              const pinned = new Set(r.assignedMonoliths || []);
              const setPinned = (next) => updateResource(r.id, { assignedMonoliths: next });
              // Compute who else (same role) has pinned each monolith — to warn about conflicts
              const otherPins = {}; // monoId -> resource name (excluding this one)
              for (const x of state.resources) {
                if (x.id === r.id || x.role !== r.role) continue;
                for (const m of (x.assignedMonoliths || [])) {
                  if (!otherPins[m]) otherPins[m] = x.name;
                }
              }
              const groups = {
                'M-group (main arena)': allMonoIds.filter(x => x.startsWith('M')),
                'H-group (hospitality)': allMonoIds.filter(x => x.startsWith('H')),
                'N-group (ancillary)':   allMonoIds.filter(x => x.startsWith('N')),
                'S-group (secondary)':   allMonoIds.filter(x => x.startsWith('S')),
                'Other':                 allMonoIds.filter(x => !x.match(/^[MHNS]/)),
              };
              const accent = ROLE_MAP[r.role]?.color || 'var(--info)';
              out.push(h('div', { key: r.id + '_asg', style: {
                gridColumn: '1 / -1', padding: '12px 8px', marginTop: '-4px', marginBottom: '4px',
                borderTop: '1px dashed var(--info)', background: 'var(--bg)',
              }},
                h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '8px' } },
                  h('div', { style: { fontFamily: 'var(--mono)', fontSize: '10px', color: 'var(--ink-mute)',
                    textTransform: 'uppercase', letterSpacing: '0.14em' } },
                    `${r.name} — pinned monoliths (${pinned.size}/${allMonoIds.length})`,
                    h('span', { style: { color: accent, marginLeft: '10px', textShadow: '0 0 4px ' + accent + '99' } },
                      pinned.size === 0 ? 'Empty = work via round-robin' : 'Round-robin will skip these monoliths for ' + r.name)
                  ),
                  h('div', { style: { display: 'flex', gap: '6px' } },
                    h('button', {
                      onClick: () => setPinned([]),
                      style: { fontFamily: 'var(--mono)', fontSize: '10px', padding: '3px 8px',
                        border: '1px solid var(--rule)', background: 'transparent', color: 'var(--ink-mute)',
                        cursor: 'pointer', textTransform: 'uppercase', letterSpacing: '0.1em' },
                    }, 'Clear all'),
                    h('button', {
                      onClick: () => setPinned([...allMonoIds]),
                      style: { fontFamily: 'var(--mono)', fontSize: '10px', padding: '3px 8px',
                        border: '1px solid ' + accent, background: 'transparent', color: accent,
                        cursor: 'pointer', textTransform: 'uppercase', letterSpacing: '0.1em' },
                    }, 'Pin all'),
                  )
                ),
                // Footer note + minimize button — pinned summary, click to collapse
                h('div', { style: { display: 'flex', justifyContent: 'flex-end', alignItems: 'center', gap: '8px',
                  marginBottom: '10px', paddingBottom: '6px', borderBottom: '1px dashed var(--rule)' } },
                  pinned.size > 0 && h('span', { style: { fontFamily: 'var(--mono)', fontSize: '10px',
                    color: accent, marginRight: 'auto', textShadow: '0 0 4px ' + accent + '88' } },
                    `${r.name} pinned to: ${[...pinned].sort().join(', ')}`),
                  h('button', {
                    onClick: () => setOpenAsg(null),
                    title: 'Minimize this editor',
                    style: { fontFamily: 'var(--mono)', fontSize: '10px', padding: '3px 10px',
                      border: '1px solid ' + accent, background: 'transparent', color: accent,
                      cursor: 'pointer', textTransform: 'uppercase', letterSpacing: '0.1em',
                      boxShadow: '0 0 6px ' + accent + '44' },
                  }, '▲ Minimize'),
                ),
                Object.entries(groups).filter(([_, list]) => list.length > 0).map(([groupName, list]) =>
                  h('div', { key: groupName, style: { marginBottom: '8px' } },
                    h('div', { style: { fontFamily: 'var(--mono)', fontSize: '9px', color: 'var(--ink-mute)',
                      textTransform: 'uppercase', letterSpacing: '0.12em', marginBottom: '4px',
                      display: 'flex', justifyContent: 'space-between' } },
                      h('span', null, groupName),
                      h('span', { style: { display: 'flex', gap: '6px' } },
                        h('button', {
                          onClick: () => setPinned([...new Set([...(r.assignedMonoliths||[]), ...list])]),
                          style: { fontSize: '9px', background: 'none', border: 'none', cursor: 'pointer',
                            color: accent, fontFamily: 'var(--mono)', letterSpacing: '0.1em' },
                        }, '+ all'),
                        h('button', {
                          onClick: () => setPinned((r.assignedMonoliths||[]).filter(x => !list.includes(x))),
                          style: { fontSize: '9px', background: 'none', border: 'none', cursor: 'pointer',
                            color: 'var(--ink-mute)', fontFamily: 'var(--mono)', letterSpacing: '0.1em' },
                        }, '− all'),
                      )
                    ),
                    h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '4px' } },
                      list.map(m => {
                        const isPinned = pinned.has(m);
                        const conflictName = otherPins[m];
                        return h('button', {
                          key: m,
                          onClick: () => {
                            const next = isPinned
                              ? (r.assignedMonoliths || []).filter(x => x !== m)
                              : [...(r.assignedMonoliths || []), m];
                            setPinned(next);
                          },
                          title: conflictName ? 'Currently pinned to ' + conflictName + ' as well — first listed wins' : (isPinned ? 'Click to unpin' : 'Click to pin to ' + r.name),
                          style: {
                            fontFamily: 'var(--mono)', fontSize: '11px', padding: '3px 8px',
                            border: '1px solid ' + (isPinned ? accent : 'var(--rule)'),
                            background: isPinned ? accent : 'var(--bg)',
                            color: isPinned ? '#000' : (conflictName ? 'var(--accent)' : 'var(--ink-soft)'),
                            fontWeight: isPinned ? 700 : 500,
                            cursor: 'pointer',
                            boxShadow: isPinned ? '0 0 6px ' + accent + '88' : 'none',
                          },
                        }, m, conflictName && !isPinned && h('span', { style: { fontSize: '8px', marginLeft: '3px' } }, '⚠'));
                      })
                    )
                  )
                )
              ));
            }
            return out;
          })
        ),
        h('button', { className: 'res-add', onClick: () => addResource(role.id) },
          `+ Add ${role.short}`)
      );
    }),
    // Total payment per resource — bottom-of-tab summary
    h('div', { className: 'res-role-card cost-cell', style: { '--role-color': 'var(--ok)' } },
      h('div', { className: 'res-role-head' },
        h('div', null,
          h('div', { className: 'res-role-title' }, 'Total Payment & Direct Cost per Resource'),
          h('div', { className: 'res-role-meta' },
            'Direct cost (revenue) = hours × bid rate. Total payment = hours × cost rate. Margin = direct cost − payment.')
        )
      ),
      h('table', { className: 'cost-table', style: { width: '100%' } },
        h('thead', null, h('tr', null,
          h('th', null, 'Resource'),
          h('th', null, 'Role'),
          h('th', { style: { textAlign: 'right' } }, 'Hours'),
          h('th', { style: { textAlign: 'right' } }, 'Bid rate'),
          h('th', { style: { textAlign: 'right' } }, 'Direct cost (AED)'),
          h('th', { style: { textAlign: 'right' } }, 'Cost rate'),
          h('th', { style: { textAlign: 'right' } }, 'TOTAL PAYMENT (AED)'),
          h('th', { style: { textAlign: 'right' } }, 'Margin'),
          h('th', { style: { textAlign: 'right' } }, 'Months'),
          h('th', null, 'Source'),
        )),
        h('tbody', null,
          (() => {
            // Build per-resource lines, then merge linked entries (same person, multiple roles)
            const perRes = state.resources.map(r => {
              const role = ROLE_MAP[r.role];
              const hrs = hoursPerRes[r.id] || 0;
              const roleDef = role?.rate || 0;
              const bid = (r.rate != null) ? r.rate : roleDef;
              const cr  = (r.costRate != null) ? r.costRate : bid;
              return { r, role, hrs, bid, cr,
                directCost: hrs * bid, payment: hrs * cr };
            });
            const byId = Object.fromEntries(perRes.map(x => [x.r.id, x]));
            // Group key = primary id (the one being linked-to, or self)
            const primaryOf = (x) => x.r.linkedTo && byId[x.r.linkedTo] ? byId[x.r.linkedTo] : x;
            const groups = {};
            for (const x of perRes) {
              const p = primaryOf(x);
              const key = p.r.id;
              if (!groups[key]) groups[key] = { primary: p, members: [] };
              groups[key].members.push(x);
            }
            const rows = Object.values(groups).map(g => {
              const hrs = g.members.reduce((a,x) => a + x.hrs, 0);
              const directCost = g.members.reduce((a,x) => a + x.directCost, 0);
              const payment = g.members.reduce((a,x) => a + x.payment, 0);
              const margin = directCost - payment;
              const distinctRoles = Array.from(new Set(g.members.map(x => x.role?.short || '—')));
              const distinctRates = Array.from(new Set(g.members.map(x => x.bid))).sort();
              const distinctCosts = Array.from(new Set(g.members.map(x => x.cr))).sort();
              const bidLabel = distinctRates.length === 1 ? distinctRates[0] : 'mixed';
              const crLabel  = distinctCosts.length === 1 ? distinctCosts[0]  : 'mixed';
              const r = g.primary.r;
              const monthlySalary = r.salaryMonthly || ((typeof crLabel === 'number' ? crLabel : g.primary.cr) * 22 * (r.hrsPerDay || 9));
              const months = monthlySalary > 0 ? (payment / monthlySalary) : 0;
              const source = r.external ? 'External invoice'
                           : r.salaryMonthly ? `Salary AED ${Math.round(r.salaryMonthly).toLocaleString()}/mo`
                           : 'Internal (no salary set)';
              const isMerged = g.members.length > 1;
              return { r, role: g.primary.role, hrs, bid: bidLabel, cr: crLabel,
                directCost, payment, margin, months, source,
                roles: distinctRoles, isMerged, memberNames: g.members.map(x => x.r.name) };
            });
            const ordered = rows.sort((a,b) => ROLES.findIndex(x=>x.id===a.r.role) - ROLES.findIndex(x=>x.id===b.r.role));
            const intRows = ordered.filter(x => !x.r.external);
            const extRows = ordered.filter(x => x.r.external);
            const sum = (arr, k) => arr.reduce((a,x) => a + x[k], 0);
            const totalHrs2 = sum(ordered,'hrs');
            const totalDirect = sum(ordered,'directCost');
            const totalPay = sum(ordered,'payment');
            const totalMargin = totalDirect - totalPay;
            const intTotalHrs = sum(intRows,'hrs');
            const intTotalDirect = sum(intRows,'directCost');
            const intTotalPay = sum(intRows,'payment');
            const intTotalMargin = intTotalDirect - intTotalPay;
            const extTotalHrs = sum(extRows,'hrs');
            const extTotalDirect = sum(extRows,'directCost');
            const extTotalPay = sum(extRows,'payment');
            const extTotalMargin = extTotalDirect - extTotalPay;
            const subtotalRow = (label, hrs, direct, pay, margin, accent) => h('tr', {
              style: { background: 'rgba(0,240,255,0.03)', borderTop: '1px dashed var(--rule)' }
            },
              h('td', { style: { fontFamily: 'var(--mono)', fontSize: '10px', textTransform: 'uppercase', letterSpacing: '0.14em', color: accent, fontWeight: 700 } }, label),
              h('td', null),
              h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)', color: accent, fontWeight: 600 } }, hrs.toFixed(1)),
              h('td', null),
              h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)', color: 'var(--info)', fontWeight: 600 } }, 'AED ' + Math.round(direct).toLocaleString()),
              h('td', null),
              h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)', color: 'var(--accent)', fontWeight: 700 } }, 'AED ' + Math.round(pay).toLocaleString()),
              h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)', color: margin >= 0 ? 'var(--ok)' : 'var(--accent)', fontWeight: 600 } },
                'AED ' + Math.round(margin).toLocaleString(),
                direct > 0 && h('span', { style: { fontSize: '9px', marginLeft: '4px', color: 'var(--ink-mute)' } },
                  '(' + Math.round(margin / direct * 100) + '%)')),
              h('td', null), h('td', null),
            );
            const fmtRate = (v) => typeof v === 'number' ? 'AED ' + v.toFixed(2) : 'mixed';
            return [
              ...ordered.map(x => h('tr', { key: x.r.id },
                h('td', { style: { fontWeight: 600 } }, x.r.name,
                  x.r.external && h('span', { style: { fontSize: '9px', color: 'var(--info)', marginLeft: '6px', fontFamily: 'var(--mono)' } }, '[EXT]'),
                  x.isMerged && h('span', { style: { fontSize: '9px', color: 'var(--neon-purple)', marginLeft: '6px', fontFamily: 'var(--mono)', textShadow: '0 0 4px rgba(177,75,255,0.5)' },
                    title: 'Merged from: ' + x.memberNames.join(' + ') }, '🔗 ×' + x.memberNames.length)),
                h('td', { style: { fontFamily: 'var(--mono)', color: 'var(--ink-mute)', fontSize: '11px' } },
                  x.roles ? x.roles.join(' + ') : (x.role?.short || '—')),
                h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)' } }, x.hrs.toFixed(1)),
                h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)', color: 'var(--info)' } }, fmtRate(x.bid)),
                h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)', color: 'var(--info)', fontWeight: 600 } }, 'AED ' + Math.round(x.directCost).toLocaleString()),
                h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)', color: 'var(--ink-mute)' } }, fmtRate(x.cr)),
                h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)', color: 'var(--accent)', fontWeight: 700, fontSize: '13px', textShadow: 'var(--glow-pink)' } }, 'AED ' + Math.round(x.payment).toLocaleString()),
                h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)',
                  color: x.margin > 0 ? 'var(--ok)' : x.margin < 0 ? 'var(--accent)' : 'var(--ink-mute)',
                  fontWeight: 700,
                  textShadow: x.margin > 0 ? 'var(--glow-green)' : (x.margin < 0 ? 'var(--glow-pink)' : 'none') } },
                  'AED ' + Math.round(x.margin).toLocaleString(),
                  x.directCost > 0 && h('span', { style: { fontSize: '9px', marginLeft: '4px', color: 'var(--ink-mute)', textShadow: 'none' } },
                    '(' + Math.round(x.margin / x.directCost * 100) + '%)')
                ),
                h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)', color: 'var(--ink-mute)' } }, x.months > 0 ? x.months.toFixed(1) + ' mo' : '—'),
                h('td', { style: { fontFamily: 'var(--mono)', fontSize: '10px', color: 'var(--ink-soft)' } }, x.source),
              )),
              // Subtotals: INTERNAL and EXTERNAL
              intRows.length > 0 && subtotalRow('Subtotal · Internal', intTotalHrs, intTotalDirect, intTotalPay, intTotalMargin, 'var(--ok)'),
              extRows.length > 0 && subtotalRow('Subtotal · External', extTotalHrs, extTotalDirect, extTotalPay, extTotalMargin, 'var(--info)'),
              h('tr', { className: 'cost-total-row', key: 'total' },
                h('td', null, 'GRAND TOTAL'), h('td', null),
                h('td', { style: { textAlign: 'right' } }, totalHrs2.toFixed(1)),
                h('td', null),
                h('td', { style: { textAlign: 'right', color: 'var(--info)' } }, 'AED ' + Math.round(totalDirect).toLocaleString()),
                h('td', null),
                h('td', { style: { textAlign: 'right', color: 'var(--accent)' } }, 'AED ' + Math.round(totalPay).toLocaleString()),
                h('td', { style: { textAlign: 'right', color: 'var(--ok)' } }, 'AED ' + Math.round(totalMargin).toLocaleString(),
                  totalDirect > 0 && h('span', { style: { fontSize: '10px', marginLeft: '4px', color: 'var(--ink-mute)' } },
                    '(' + Math.round(totalMargin / totalDirect * 100) + '%)')),
                h('td', null), h('td', null),
              )
            ].filter(Boolean);
          })()
        )
      )
    )
  );
}

// ---------- Panels View (panel types from Excel) ----------
function PanelsView({ state }) {
  const [selectedMono, setSelectedMono] = useState('M01');
  const ptypes = COSTING_DATA.ptypes || [];
  const monos = COSTING_DATA.monoliths_data || [];
  const totals = ptypes.reduce((a,r) => ({
    panels: a.panels + (r.panels||0), area: a.area + (r.area||0), cost: a.cost + (r.directCost||0),
  }), { panels: 0, area: 0, cost: 0 });
  const monoTotals = monos.reduce((a,r) => ({
    panels: a.panels + (r.panels||0), area: a.area + (r.area||0), cost: a.cost + (r.directCost||0),
  }), { panels: 0, area: 0, cost: 0 });
  const fmt = (n) => 'AED ' + Math.round(n).toLocaleString();

  // Color spectrum across panel types — gamer palette
  const spectrum = ['#00f0ff','#39ff7a','#ffcc33','#ff2d6f','#b14bff','#9ab3c9',
                    '#00ffd0','#ff7a00','#ff0066','#00ccff','#ccff33','#ff66cc','#a0ff66'];
  const typeColor = (i) => spectrum[i % spectrum.length];

  return h('div', { className: 'cost-wrap' },
    // Top summary
    h('div', { className: 'cost-summary' },
      h('div', { className: 'cost-summary-stat' },
        h('div', { className: 'num' }, totals.panels.toLocaleString()),
        h('div', { className: 'lbl' }, 'Total panels (GRC)')),
      h('div', { className: 'cost-summary-stat' },
        h('div', { className: 'num' }, totals.area.toFixed(0)),
        h('div', { className: 'lbl' }, 'Total area (m²)')),
      h('div', { className: 'cost-summary-stat' },
        h('div', { className: 'num' }, ptypes.length),
        h('div', { className: 'lbl' }, 'Panel types')),
      h('div', { className: 'cost-summary-stat cost-cell' },
        h('div', { className: 'num' }, fmt(totals.cost)),
        h('div', { className: 'lbl' }, 'Direct cost')),
    ),

    // Panel Types
    h('div', { className: 'cost-section' },
      h('div', { className: 'cost-section-head' }, 'Panel Types — A through HT'),
      h('div', { style: { fontFamily: 'var(--mono)', fontSize: '10px', color: 'var(--ink-mute)', textTransform: 'uppercase', letterSpacing: '0.14em', marginBottom: '8px' } },
        'From sheet 1. Cost Summary Per M & P, Section 2'),
      // Visual chips
      h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '8px', marginBottom: '14px' } },
        ptypes.map((p,i) => {
          const c = typeColor(i);
          const pct = totals.panels > 0 ? (p.panels / totals.panels * 100) : 0;
          return h('div', { key: p.type, style: {
            background: 'var(--paper)',
            border: '1px solid ' + c,
            borderLeft: '4px solid ' + c,
            padding: '10px 14px', minWidth: '130px',
            boxShadow: `0 0 12px ${c}44`,
          }},
            h('div', { style: { fontFamily: 'var(--display)', fontSize: '20px', fontWeight: 700, color: c, textShadow: `0 0 8px ${c}99` } }, 'Type ' + p.type),
            h('div', { style: { fontFamily: 'var(--mono)', fontSize: '11px', color: 'var(--ink)', marginTop: '4px' } }, p.panels.toLocaleString() + ' pcs'),
            h('div', { style: { fontFamily: 'var(--mono)', fontSize: '10px', color: 'var(--ink-mute)' } }, p.area.toFixed(1) + ' m² · ' + pct.toFixed(1) + '%'),
            h('div', { style: { fontFamily: 'var(--mono)', fontSize: '10px', color: 'var(--accent)', marginTop: '2px' }, className: 'cost-cell' }, fmt(p.directCost))
          );
        })
      ),
      // Detailed table
      h('table', { className: 'cost-table' },
        h('thead', null, h('tr', null,
          h('th', null, 'Type'),
          h('th', { style: { textAlign: 'right' } }, 'Panels'),
          h('th', { style: { textAlign: 'right' } }, 'Area (m²)'),
          h('th', { style: { textAlign: 'right' } }, 'Avg m² / panel'),
          h('th', { style: { textAlign: 'right' }, className: 'cost-cell' }, 'Direct cost'),
          h('th', { style: { textAlign: 'right' }, className: 'cost-cell' }, 'AED / m²'),
          h('th', { style: { textAlign: 'right' }, className: 'cost-cell' }, 'AED / panel'),
          h('th', { style: { textAlign: 'right' } }, '% panels'),
          h('th', { style: { textAlign: 'right' }, className: 'cost-cell' }, '% cost'),
        )),
        h('tbody', null,
          ptypes.map((p,i) => {
            const c = typeColor(i);
            const avgArea = p.panels > 0 ? p.area / p.panels : 0;
            const aedM2 = p.area > 0 ? p.directCost / p.area : 0;
            const aedPanel = p.panels > 0 ? p.directCost / p.panels : 0;
            return h('tr', { key: p.type },
              h('td', { style: { fontFamily: 'var(--mono)', fontWeight: 700, color: c, textShadow: `0 0 6px ${c}66` } }, p.type),
              h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)' } }, p.panels.toLocaleString()),
              h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)' } }, p.area.toFixed(2)),
              h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)', color: 'var(--ink-mute)' } }, avgArea.toFixed(2)),
              h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)' }, className: 'cost-cell' }, fmt(p.directCost)),
              h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)', color: 'var(--ink-mute)' }, className: 'cost-cell' }, aedM2.toFixed(2)),
              h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)', color: 'var(--ink-mute)' }, className: 'cost-cell' }, aedPanel.toFixed(2)),
              h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)', color: 'var(--ink-mute)' } }, totals.panels > 0 ? (p.panels/totals.panels*100).toFixed(1) + '%' : '—'),
              h('td', { style: { textAlign: 'right', fontFamily: 'var(--mono)', color: 'var(--ink-mute)' }, className: 'cost-cell' }, totals.cost > 0 ? (p.directCost/totals.cost*100).toFixed(1) + '%' : '—'),
            );
          }),
          h('tr', { className: 'cost-total-row' },
            h('td', null, 'TOTAL'),
            h('td', { style: { textAlign: 'right' } }, totals.panels.toLocaleString()),
            h('td', { style: { textAlign: 'right' } }, totals.area.toFixed(2)),
            h('td', null),
            h('td', { style: { textAlign: 'right' }, className: 'cost-cell' }, fmt(totals.cost)),
            h('td', { style: { textAlign: 'right' }, className: 'cost-cell' }, totals.area > 0 ? (totals.cost/totals.area).toFixed(2) : '—'),
            h('td', null),
            h('td', { style: { textAlign: 'right' } }, '100%'),
            h('td', { style: { textAlign: 'right' }, className: 'cost-cell' }, '100%'),
          )
        )
      )
    ),

    // Per-monolith panel-by-panel detail (Type × Length × Count)
    h('div', { className: 'cost-section' },
      h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '12px', borderBottom: '1px dashed var(--rule)', paddingBottom: '8px' } },
        h('div', { className: 'cost-section-head', style: { borderBottom: 'none', marginBottom: 0, paddingBottom: 0 } },
          'Panel Detail — by Type & Length'),
        h('select', {
          className: 'group-select',
